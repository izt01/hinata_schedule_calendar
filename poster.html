<!-- pwa-check disabled -->
<style>
.poster-hero {
  margin:0 0 24px; padding:32px 20px 24px;
  background:linear-gradient(145deg,#6040c0 0%,#4020a0 50%,#201080 100%);
  border-radius:0 0 32px 32px; text-align:center;
  box-shadow:0 8px 32px rgba(80,40,180,0.3);
}
.poster-hero-icon  { font-size:52px; margin-bottom:10px; }
.poster-hero-title { font-family:'Shippori Mincho',serif; font-size:26px; font-weight:800; color:white; letter-spacing:0.1em; margin-bottom:4px; }
.poster-hero-sub   { font-family:'Noto Serif JP',serif; font-size:11px; color:rgba(255,255,255,0.8); letter-spacing:0.15em; }

/* 繧ｭ繝｣繝ｳ繝壹・繝ｳ繝舌リ繝ｼ */
.campaign-banner {
  background:linear-gradient(135deg,rgba(96,64,192,0.12),rgba(64,32,160,0.08));
  border:1.5px solid rgba(96,64,192,0.3); border-radius:20px;
  padding:16px 18px; margin-bottom:20px;
}
.campaign-banner-title { font-family:'Shippori Mincho',serif; font-size:18px; font-weight:800; color:#4020a0; margin-bottom:4px; }
.campaign-banner-sub   { font-family:'Noto Serif JP',serif; font-size:11px; color:var(--sumi-light); }
.campaign-banner-period { display:inline-block; margin-top:8px; padding:3px 10px; border-radius:10px; background:rgba(96,64,192,0.1); color:#4020a0; font-size:10px; font-weight:700; font-family:'Noto Serif JP',serif; border:1px solid rgba(96,64,192,0.2); }
.campaign-banner-member { display:inline-block; margin-top:4px; margin-left:6px; padding:3px 10px; border-radius:10px; background:rgba(200,40,80,0.08); color:#a02040; font-size:10px; font-weight:700; font-family:'Noto Serif JP',serif; border:1px solid rgba(200,40,80,0.2); }

/* 繧ｭ繝｣繝ｳ繝壹・繝ｳ驕ｸ謚槭ち繝・*/
.campaign-tabs { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:16px; -webkit-overflow-scrolling:touch; }
.campaign-tab { flex-shrink:0; padding:8px 14px; border-radius:20px; border:1.5px solid var(--hina-2); background:rgba(255,255,255,0.8); font-family:'Noto Serif JP',serif; font-size:11px; font-weight:600; color:var(--sumi-light); cursor:pointer; white-space:nowrap; touch-action:manipulation; }
.campaign-tab.active { background:#4020a0; border-color:#4020a0; color:white; }

/* 繝昴せ繧ｿ繝ｼ繧ｰ繝ｪ繝・ラ */
.poster-grid { display:flex; flex-direction:column; gap:16px; margin-bottom:100px; }
.poster-card { background:rgba(255,255,255,0.88); backdrop-filter:blur(10px); border-radius:22px; border:1.5px solid var(--hina-2); overflow:hidden; box-shadow:var(--shadow-hina); }
.poster-card-img { width:100%; aspect-ratio:3/4; object-fit:cover; display:block; cursor:pointer; }
.poster-card-body { padding:14px 16px 0; }
.poster-card-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.poster-card-avatar { width:32px; height:32px; border-radius:50%; object-fit:cover; border:1.5px solid var(--hina-2); flex-shrink:0; display:flex; align-items:center; justify-content:center; background:var(--hina-1); font-size:16px; overflow:hidden; }
.poster-card-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.poster-card-name  { font-family:'Noto Serif JP',serif; font-size:12px; font-weight:600; color:var(--sumi); flex:1; }
.poster-card-caption { font-family:'Noto Serif JP',serif; font-size:12px; color:var(--sumi-light); margin-bottom:10px; line-height:1.6; }
.poster-card-actions { display:flex; gap:12px; padding:10px 0; border-top:1px solid var(--hina-1); }
.poster-action-btn { display:flex; align-items:center; gap:5px; background:none; border:none; font-size:12px; color:var(--sumi-light); cursor:pointer; font-family:'Noto Serif JP',serif; padding:4px 8px; border-radius:10px; touch-action:manipulation; }
.poster-action-btn.liked { color:#e05080; }
.poster-action-btn:active { background:var(--hina-1); }
.poster-delete-btn { margin-left:auto; background:none; border:none; font-size:11px; color:rgba(200,60,60,0.5); cursor:pointer; padding:4px 8px; border-radius:10px; touch-action:manipulation; }

/* 繧ｳ繝｡繝ｳ繝・*/
.comments-section { padding:12px 16px 14px; background:var(--hina-0); border-top:1px solid var(--hina-1); display:none; }
.comments-section.open { display:block; }
.comment-item { padding:8px 0; border-bottom:1px solid var(--hina-1); }
.comment-item:last-child { border-bottom:none; }
.comment-name { font-family:'Noto Serif JP',serif; font-size:10px; font-weight:700; color:var(--sky); }
.comment-body { font-family:'Noto Serif JP',serif; font-size:12px; color:var(--sumi); line-height:1.6; }
.comment-input-row { display:flex; gap:8px; margin-top:10px; }
.comment-input { flex:1; background:rgba(255,255,255,0.9); border:1.5px solid var(--hina-2); border-radius:12px; padding:8px 12px; font-family:'Noto Sans JP',sans-serif; font-size:12px; color:var(--sumi); outline:none; }
.comment-send-btn { padding:8px 14px; border-radius:12px; background:var(--sky); border:none; color:white; font-size:12px; font-weight:700; cursor:pointer; touch-action:manipulation; }

/* 蜿嶺ｻ俶悄髢灘､・*/
.closed-banner { text-align:center; padding:40px 20px; }
.closed-banner-icon { font-size:52px; margin-bottom:12px; }
.closed-banner-title { font-family:'Shippori Mincho',serif; font-size:20px; font-weight:800; color:#4020a0; margin-bottom:8px; }
.closed-banner-sub { font-family:'Noto Serif JP',serif; font-size:13px; color:var(--sumi-light); line-height:1.8; }

/* 繝｢繝ｼ繝繝ｫ */
.ev-modal-wrap { display:none; position:fixed; inset:0; z-index:300; align-items:flex-end; justify-content:center; }
.ev-modal-wrap.open { display:flex; }
.ev-modal-bg { position:absolute; inset:0; background:rgba(10,30,60,0.5); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); }
.ev-modal-box { position:relative; width:100%; max-width:430px; background:var(--white-bg); border-radius:32px 32px 0 0; padding:12px 22px 52px; max-height:92vh; overflow-y:auto; -webkit-overflow-scrolling:touch; border-top:1.5px solid var(--hina-2); z-index:1; }
</style>
</head>

  <div class="page-content page-enter" style="padding-top:0">

    <div id="closedBanner" class="closed-banner" style="display:none">

    <!-- 繝昴せ繧ｿ繝ｼ荳隕ｧ -->

    <div style="margin-bottom:14px">

        <div id="imgPickerPlaceholder" style="text-align:center;color:var(--sumi-light)">

    <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px;cursor:pointer;font-family:'Noto Serif JP',serif;font-size:13px;color:var(--sumi-light)">
      <input type="checkbox" id="anonCheck" style="width:16px;height:16px;accent-color:#4020a0"> 蛹ｿ蜷阪〒謚慕ｨｿ縺吶ｋ
    </label>

    <button class="btn-primary" id="posterSubmitBtn" style="width:100%;justify-content:center;background:linear-gradient(135deg,#6040c0,#4020a0)">

<script src="data.js"></script>

<script>
document.getElementById('headerMount').outerHTML = headerHTML('繝昴せ繧ｿ繝ｼ譯・, '耳 縺ｿ繧薙↑縺ｮ繝・じ繧､繝ｳ 耳');
injectNav('poster.html');

var campaigns       = [];
var currentCampaign = null;
var allPosters      = [];
var pendingDataUrl  = null;
var openComments    = {};

// 笏≫煤笏・蛻晄悄蛹・笏≫煤笏・(async function init() {
  // 繧ｭ繝｣繝ｳ繝壹・繝ｳ荳隕ｧ繧貞叙蠕・  try {
    campaigns = await apiFetch('/api/poster-campaigns') || [];
  } catch { campaigns = []; }

  if (!campaigns.length) {
    document.getElementById('closedBanner').style.display = 'block';
    document.getElementById('posterGrid').style.display   = 'none';
    return;
  }

  // 蜈ｬ髢倶ｸｭ縺ｮ繧ｭ繝｣繝ｳ繝壹・繝ｳ縺後≠繧九°
  var jstNow = new Date(Date.now() + 9 * 60 * 60 * 1000);
  var today = jstNow.toISOString().split('T')[0];
  var openCampaigns   = campaigns.filter(function(c) { var f=c.open_from.split('T')[0]; var t=c.open_to.split('T')[0]; return f<=today && today<=t; });
  var futureCampaigns = campaigns.filter(function(c) { return c.open_from > today; });

  // 繧ｿ繝悶ｒ陦ｨ遉ｺ・郁､・焚繧ｭ繝｣繝ｳ繝壹・繝ｳ縺後≠繧句ｴ蜷茨ｼ・  if (campaigns.length > 1) {
    buildCampaignTabs();
  }

  // 譛蛻昴・繧ｭ繝｣繝ｳ繝壹・繝ｳ繧帝∈謚橸ｼ亥・髢倶ｸｭ繧貞━蜈茨ｼ・  selectCampaign(openCampaigns.length ? openCampaigns[0] : campaigns[0]);
})();

// 笏≫煤笏・繧ｭ繝｣繝ｳ繝壹・繝ｳ繧ｿ繝・笏≫煤笏・function buildCampaignTabs() {
  var wrap = document.getElementById('campaignTabsWrap');
  var tabs = document.getElementById('campaignTabs');
  wrap.style.display = 'block';
  tabs.innerHTML = campaigns.map(function(c) {
    return '<button class="campaign-tab" data-id="' + c.id + '" onclick="selectCampaignById(\'' + c.id + '\')">'
      + (c.is_open ? '泙 ' : '竢ｸ ') + c.title
      + '</button>';
  }).join('');
}

function selectCampaignById(id) {
  var c = campaigns.find(function(c) { return c.id === id; });
  if (c) selectCampaign(c);
}

function selectCampaign(c) {
  currentCampaign = c;

  // 繧ｿ繝悶・繧｢繧ｯ繝・ぅ繝也憾諷・  document.querySelectorAll('.campaign-tab').forEach(function(b) {
    b.classList.toggle('active', b.dataset.id === c.id);
  });

  // 繝舌リ繝ｼ陦ｨ遉ｺ
  var banner = document.getElementById('campaignBanner');
  var fromDate = c.open_from ? c.open_from.split('T')[0].replace(/-/g, '/') : '';
  var toDate   = c.open_to   ? c.open_to.split('T')[0].replace(/-/g, '/')   : '';
  banner.style.display = 'block';
  banner.innerHTML = '<div class="campaign-banner">'
    + '<div class="campaign-banner-title">耳 ' + c.title + '</div>'
    + (c.member_name ? '<div class="campaign-banner-sub">蟇ｾ雎｡繝｡繝ｳ繝舌・・・ + c.member_name + '</div>' : '')
    + '<div style="margin-top:6px">'
    + '<span class="campaign-banner-period">套 ' + fromDate + ' 縲・' + toDate + '</span>'
    + (c.member_name ? '<span class="campaign-banner-member">現 ' + c.member_name + '</span>' : '')
    + '</div></div>';

  // 繝偵・繝ｭ繝ｼ繧ｿ繧､繝医Ν譖ｴ譁ｰ
  document.getElementById('heroTitle').textContent = c.title;
  document.getElementById('listTitle').textContent = '笨ｿ ' + c.title + ' 謚慕ｨｿ荳隕ｧ 笨ｿ';

  // 蜈ｬ髢倶ｸｭ縺九メ繧ｧ繝・け・医し繝ｼ繝舌・縺ｮis_open繧剃ｿ｡鬆ｼ・・  if (c.is_open) {
    document.getElementById('addBtn').style.display       = isLoggedIn() ? 'flex' : 'none';
    document.getElementById('closedBanner').style.display = 'none';
    document.getElementById('posterGrid').style.display   = 'flex';
  } else {
    document.getElementById('addBtn').style.display       = 'none';
    document.getElementById('posterGrid').style.display   = 'none';
    var sub    = document.getElementById('closedBannerSub');
    var jstNow3 = new Date(Date.now() + 9*60*60*1000);
    var today3  = jstNow3.toISOString().split('T')[0];
    var openDay = c.open_from ? c.open_from.split('T')[0] : '';
    if (openDay > today3) {
      sub.textContent = '蜍滄寔髢句ｧ具ｼ・ + fromDate + ' 縲・' + toDate;
    } else {
      sub.textContent = '縺薙・蜍滄寔縺ｯ邨ゆｺ・＠縺ｾ縺励◆・・ + fromDate + ' 縲・' + toDate + '・・;
    }
    document.getElementById('closedBanner').style.display = 'block';
  }

  loadPosters();
}

// 笏≫煤笏・繝昴せ繧ｿ繝ｼ荳隕ｧ 笏≫煤笏・function loadPosters() {
  if (!currentCampaign) return;
  var grid = document.getElementById('posterGrid');
  grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">耳</div><div class="empty-state-text">隱ｭ縺ｿ霎ｼ縺ｿ荳ｭ窶ｦ</div></div>';

  apiFetch('/api/posters?campaign_id=' + currentCampaign.id).then(function(data) {
    allPosters = data || [];
    renderPosters();
  }).catch(function() {
    grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">耳</div><div class="empty-state-text">隱ｭ縺ｿ霎ｼ縺ｿ縺ｫ螟ｱ謨励＠縺ｾ縺励◆</div></div>';
  });
}

function renderPosters() {
  var grid = document.getElementById('posterGrid');
  if (!allPosters.length) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">耳</div><div class="empty-state-text">縺ｾ縺謚慕ｨｿ縺後≠繧翫∪縺帙ｓ<br>譛蛻昴・荳譫壹ｒ謚慕ｨｿ縺励∪縺励ｇ縺・ｼ・/div></div>';
    return;
  }
  var myId = getUser() ? getUser().id : null;
  grid.innerHTML = allPosters.map(function(p) {
    var isOwn   = p.is_own;
    var isLiked = p.is_liked;
    var avHtml  = p.owner_avatar
      ? '<div class="poster-card-avatar"><img src="' + p.owner_avatar + '"></div>'
      : '<div class="poster-card-avatar">側</div>';
    return '<div class="poster-card" id="poster_' + p.id + '">'
      + '<img class="poster-card-img" src="' + p.image_data + '" alt="" onclick="openImg(\'' + p.image_data + '\')">'
      + '<div class="poster-card-body">'
        + '<div class="poster-card-header">'
          + avHtml
          + '<div class="poster-card-name">' + (p.display_name || '蛹ｿ蜷・) + '</div>'
        + '</div>'
        + (p.caption ? '<div class="poster-card-caption">' + escapeHtml(p.caption) + '</div>' : '')
        + '<div class="poster-card-actions">'
          + '<button class="poster-action-btn' + (isLiked ? ' liked' : '') + '" onclick="toggleLike(\'' + p.id + '\')">'
            + (isLiked ? '笶､・・ : '､・) + ' <span id="likes_' + p.id + '">' + (p.likes_count || 0) + '</span>'
          + '</button>'
          + '<button class="poster-action-btn" onclick="toggleComments(\'' + p.id + '\')">'
            + '町 <span id="cmt_' + p.id + '">' + (p.comments_count || 0) + '</span>'
          + '</button>'
          + (isOwn ? '<button class="poster-delete-btn" onclick="deletePoster(\'' + p.id + '\')">卵 蜑企勁</button>' : '')
        + '</div>'
      + '</div>'
      + '<div class="comments-section" id="cmtsec_' + p.id + '">'
        + '<div id="cmtlist_' + p.id + '"></div>'
        + (isLoggedIn() ? '<div class="comment-input-row">'
            + '<input class="comment-input" id="cmtinput_' + p.id + '" placeholder="繧ｳ繝｡繝ｳ繝医ｒ蜈･蜉・..">'
            + '<button class="comment-send-btn" onclick="sendComment(\'' + p.id + '\')">騾∽ｿ｡</button>'
          + '</div>' : '')
      + '</div>'
      + '</div>';
  }).join('');
}

// 笏≫煤笏・縺・＞縺ｭ 笏≫煤笏・function toggleLike(posterId) {
  if (!isLoggedIn()) { alert('繝ｭ繧ｰ繧､繝ｳ縺悟ｿ・ｦ√〒縺・); return; }
  apiFetch('/api/posters/' + posterId + '/like', { method: 'POST' }).then(function(r) {
    if (!r) return;
    var p = allPosters.find(function(p) { return p.id === posterId; });
    if (!p) return;
    p.is_liked    = r.liked;
    p.likes_count = r.liked ? (p.likes_count || 0) + 1 : Math.max(0, (p.likes_count || 1) - 1);
    var btn = document.querySelector('#poster_' + posterId + ' .poster-action-btn');
    if (btn) { btn.innerHTML = (r.liked ? '笶､・・ : '､・) + ' <span id="likes_' + posterId + '">' + p.likes_count + '</span>'; btn.className = 'poster-action-btn' + (r.liked ? ' liked' : ''); }
  }).catch(function() {});
}

// 笏≫煤笏・繧ｳ繝｡繝ｳ繝・笏≫煤笏・function toggleComments(posterId) {
  var sec = document.getElementById('cmtsec_' + posterId);
  if (!sec) return;
  var isOpen = sec.classList.contains('open');
  sec.classList.toggle('open', !isOpen);
  if (!isOpen && !openComments[posterId]) {
    openComments[posterId] = true;
    loadComments(posterId);
  }
}

function loadComments(posterId) {
  apiFetch('/api/posters/' + posterId + '/comments').then(function(data) {
    var list = document.getElementById('cmtlist_' + posterId);
    if (!list) return;
    if (!data || !data.length) { list.innerHTML = '<div style="font-size:11px;color:var(--sumi-light);font-family:\'Noto Serif JP\',serif;padding:4px 0">縺ｾ縺繧ｳ繝｡繝ｳ繝医・縺ゅｊ縺ｾ縺帙ｓ</div>'; return; }
    list.innerHTML = data.map(function(c) {
      return '<div class="comment-item">'
        + '<div class="comment-name">' + (c.display_name || '蛹ｿ蜷・) + '</div>'
        + '<div class="comment-body">' + escapeHtml(c.body) + '</div>'
        + '</div>';
    }).join('');
  }).catch(function() {});
}

function sendComment(posterId) {
  if (!isLoggedIn()) { alert('繝ｭ繧ｰ繧､繝ｳ縺悟ｿ・ｦ√〒縺・); return; }
  var input = document.getElementById('cmtinput_' + posterId);
  var body  = input ? input.value.trim() : '';
  if (!body) return;
  apiFetch('/api/posters/' + posterId + '/comments', {
    method: 'POST',
    body: JSON.stringify({ body: body, is_anonymous: false }),
  }).then(function(r) {
    if (!r) return;
    input.value = '';
    openComments[posterId] = false;
    loadComments(posterId);
    var p = allPosters.find(function(p) { return p.id === posterId; });
    if (p) {
      p.comments_count = (p.comments_count || 0) + 1;
      var cnt = document.getElementById('cmt_' + posterId);
      if (cnt) cnt.textContent = p.comments_count;
    }
  }).catch(function(err) { alert('繧ｳ繝｡繝ｳ繝医お繝ｩ繝ｼ: ' + err.message); });
}

// 笏≫煤笏・蜑企勁 笏≫煤笏・function deletePoster(posterId) {
  if (!confirm('縺薙・謚慕ｨｿ繧貞炎髯､縺励∪縺吶°・・)) return;
  apiFetch('/api/posters/' + posterId, { method: 'DELETE' }).then(function() {
    allPosters = allPosters.filter(function(p) { return p.id !== posterId; });
    renderPosters();
  }).catch(function(err) { alert('蜑企勁繧ｨ繝ｩ繝ｼ: ' + err.message); });
}

// 笏≫煤笏・逕ｻ蜒乗僑螟ｧ 笏≫煤笏・function openImg(src) {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;cursor:pointer';
  overlay.innerHTML = '<img src="' + src + '" style="max-width:100%;max-height:100%;object-fit:contain">';
  overlay.onclick = function() { document.body.removeChild(overlay); };
  document.body.appendChild(overlay);
}

// 笏≫煤笏・謚慕ｨｿ繝｢繝ｼ繝繝ｫ 笏≫煤笏・function on(id, fn) {
  var el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('click', fn);
  el.addEventListener('touchend', function(e) { e.preventDefault(); fn(); }, { passive: false });
}

on('addBtn',       openAddModal);
on('addModalBg',   closeAddModal);
on('addModalClose',closeAddModal);
on('posterSubmitBtn', submitPoster);

document.getElementById('posterFileInput').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    pendingDataUrl = ev.target.result;
    var preview = document.getElementById('posterPreview');
    preview.src = pendingDataUrl; preview.style.display = 'block';
    document.getElementById('imgPickerPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

function openAddModal() {
  if (!isLoggedIn()) { alert('謚慕ｨｿ縺吶ｋ縺ｫ縺ｯ繝ｭ繧ｰ繧､繝ｳ縺悟ｿ・ｦ√〒縺・); window.location.href = 'profile.html'; return; }
  if (!currentCampaign || !currentCampaign.is_open) { alert('迴ｾ蝨ｨ縺薙・蜍滄寔縺ｯ蜿嶺ｻ俶悄髢灘､悶〒縺・); return; }
  pendingDataUrl = null;
  document.getElementById('posterCaption').value = '';
  document.getElementById('anonCheck').checked   = false;
  document.getElementById('posterPreview').style.display = 'none';
  document.getElementById('imgPickerPlaceholder').style.display = 'flex';
  document.getElementById('addModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
  document.body.style.overflow = '';
}

function submitPoster() {
  if (!pendingDataUrl) { alert('逕ｻ蜒上ｒ驕ｸ謚槭＠縺ｦ縺上□縺輔＞'); return; }
  var btn = document.getElementById('posterSubmitBtn');
  btn.disabled = true; btn.textContent = '謚慕ｨｿ荳ｭ窶ｦ';
  apiFetch('/api/posters', {
    method: 'POST',
    body: JSON.stringify({
      image_data:   pendingDataUrl,
      caption:      document.getElementById('posterCaption').value.trim(),
      is_anonymous: document.getElementById('anonCheck').checked,
      campaign_id:  currentCampaign ? currentCampaign.id : null,
    }),
  }).then(function(r) {
    if (r) { closeAddModal(); loadPosters(); }
  }).catch(function(err) {
    alert('謚慕ｨｿ繧ｨ繝ｩ繝ｼ: ' + err.message);
  }).finally(function() {
    btn.disabled = false; btn.textContent = '謚・遞ｿ';
  });
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() { navigator.serviceWorker.register('./service-worker.js'); });
}
</script>
