<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>日向坂46 — アカウント設定</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#8b2252">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
<style>
.profile-hero {
  margin: 0 0 24px; padding: 36px 24px 28px;
  background: linear-gradient(145deg, var(--sky) 0%, #1e88c8 60%, #3aa8e8 100%);
  border-radius: 0 0 32px 32px; text-align: center;
  box-shadow: 0 8px 36px rgba(21,101,160,0.28);
}
.profile-avatar-wrap {
  width: 96px; height: 96px; border-radius: 50%;
  border: 4px solid rgba(255,255,255,0.9); margin: 0 auto 14px;
  overflow: hidden; background: var(--hina-1); cursor: pointer;
  position: relative; box-shadow: 0 4px 18px rgba(0,0,0,0.2);
  display: flex; align-items: center; justify-content: center; transition: transform 0.18s;
}
.profile-avatar-wrap:active { transform: scale(0.94); }
.profile-avatar-wrap img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.profile-avatar-placeholder { font-size: 44px; }
.profile-avatar-edit { position:absolute; bottom:0; right:0; width:28px; height:28px; background:var(--sky); border:2px solid white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; color:white; }
.profile-name  { font-family:'Shippori Mincho',serif; font-size:22px; font-weight:800; color:white; letter-spacing:0.08em; margin-bottom:4px; }
.profile-email { font-family:'Noto Serif JP',serif; font-size:11px; color:rgba(255,255,255,0.75); }
.profile-login-badge { display:inline-block; margin-top:10px; padding:4px 14px; border-radius:20px; background:rgba(255,255,255,0.2); color:white; font-size:10px; font-family:'Noto Serif JP',serif; letter-spacing:0.1em; }

/* タブ切替（登録/ログイン） */
.auth-tabs { display:flex; border:1.5px solid var(--hina-2); border-radius:18px; overflow:hidden; background:rgba(255,255,255,0.5); margin-bottom:18px; }
.auth-tab { flex:1; padding:12px 8px; text-align:center; font-family:'Noto Serif JP',serif; font-size:13px; font-weight:600; color:var(--sumi-light); border:none; background:none; cursor:pointer; transition:all 0.18s; touch-action:manipulation; }
.auth-tab.active { background:var(--sky); color:white; font-weight:700; }

.profile-card { background:rgba(255,255,255,0.82); backdrop-filter:blur(10px); border-radius:20px; border:1.5px solid var(--hina-2); padding:20px; box-shadow:var(--shadow-hina); margin-bottom:16px; }
.profile-card-title { font-family:'M PLUS Rounded 1c',sans-serif; font-size:13px; font-weight:800; color:var(--sky); margin-bottom:14px; letter-spacing:0.06em; }

/* パスワード入力 */
.password-wrap { position:relative; }
.password-wrap input { padding-right:48px; }
.password-toggle { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; font-size:16px; cursor:pointer; color:var(--sumi-light); touch-action:manipulation; padding:4px; }

/* アバター */
.avatar-tabs { display:flex; gap:8px; margin-bottom:14px; }
.avatar-tab { flex:1; padding:9px 4px; border-radius:20px; border:1.5px solid var(--hina-2); background:rgba(255,255,255,0.75); font-family:'Noto Serif JP',serif; font-size:11px; font-weight:600; color:var(--sumi-light); cursor:pointer; text-align:center; transition:all 0.2s; touch-action:manipulation; }
.avatar-tab.active { background:var(--sky); border-color:var(--sky); color:white; }
.member-avatar-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:12px; }
.member-avatar-cell { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:6px 2px; border-radius:12px; border:2px solid transparent; transition:all 0.15s; font-size:9px; font-family:'Noto Serif JP',serif; color:var(--sumi-light); text-align:center; touch-action:manipulation; }
.member-avatar-cell.selected { border-color:var(--sky); background:var(--hina-1); color:var(--sky); font-weight:700; }
.member-avatar-cell img { width:44px; height:44px; border-radius:50%; object-fit:cover; border:2px solid var(--hina-2); }
.upload-avatar-area { width:100%; aspect-ratio:1; max-width:160px; margin:0 auto; border-radius:50%; overflow:hidden; border:2.5px dashed var(--hina-3); background:var(--hina-0); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:border-color 0.2s; position:relative; touch-action:manipulation; }
.upload-avatar-area img { width:100%; height:100%; object-fit:cover; }

/* ログアウト/削除ボタン */
.btn-danger { display:inline-flex; align-items:center; justify-content:center; gap:6px; width:100%; padding:13px 28px; background:rgba(200,60,60,0.1); color:#c03030; border:1.5px solid rgba(200,60,60,0.3); border-radius:16px; font-family:'M PLUS Rounded 1c',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.18s; margin-top:8px; touch-action:manipulation; }
.btn-danger:active { background:rgba(200,60,60,0.2); }

/* パスワード変更フォーム */
.pw-change-wrap { border-top:1px solid var(--hina-2); margin-top:14px; padding-top:14px; display:none; }
.pw-change-wrap.open { display:block; }
</style>
</head>
<body>
<canvas id="petals-canvas"></canvas>
<div id="app">
  <div id="headerMount"></div>
  <div class="page-content page-enter" style="padding-top:0">

    <!-- ヒーロー -->
    <div class="profile-hero" id="profileHero">
      <div class="profile-avatar-wrap" id="heroAvatar" onclick="scrollToForm()">
        <span class="profile-avatar-placeholder">🌸</span>
        <div class="profile-avatar-edit">✎</div>
      </div>
      <div class="profile-name"  id="heroName">ゲスト</div>
      <div class="profile-email" id="heroEmail">アカウント未設定</div>
      <span class="profile-login-badge" id="loginBadge">✿ タップして設定 ✿</span>
    </div>

    <!-- ━━━ 未ログイン：登録 / ログインカード ━━━ -->
    <div class="profile-card" id="authCard">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabRegister">✿ 新規登録</button>
        <button class="auth-tab"        id="tabLogin">🔑 ログイン</button>
      </div>

      <!-- 新規登録フォーム -->
      <div id="registerForm">
        <div class="form-group">
          <label class="form-label">ニックネーム <span style="color:var(--sky)">*</span></label>
          <input class="form-input" id="regNickname" type="text" placeholder="例：おひさまファン" maxlength="50" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">メールアドレス（任意）</label>
          <input class="form-input" id="regEmail" type="email" placeholder="example@mail.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">パスワード <span style="color:var(--sky)">*</span>（4文字以上）</label>
          <div class="password-wrap">
            <input class="form-input" id="regPassword" type="password" placeholder="パスワードを入力" autocomplete="new-password">
            <button class="password-toggle" type="button" onclick="togglePw('regPassword',this)">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">パスワード確認 <span style="color:var(--sky)">*</span></label>
          <div class="password-wrap">
            <input class="form-input" id="regPasswordConfirm" type="password" placeholder="もう一度入力" autocomplete="new-password">
            <button class="password-toggle" type="button" onclick="togglePw('regPasswordConfirm',this)">👁</button>
          </div>
        </div>

        <!-- アイコン設定 -->
        <div class="form-group">
          <label class="form-label">アイコン設定</label>
          <div class="avatar-tabs">
            <button class="avatar-tab active" id="regAvatarTabMember" onclick="switchAvatarTab('member','reg',this)">メンバーから選ぶ</button>
            <button class="avatar-tab"        id="regAvatarTabUpload" onclick="switchAvatarTab('upload','reg',this)">写真をアップロード</button>
          </div>
          <div id="regMemberAvatarPanel">
            <div class="member-avatar-grid" id="regMemberGrid"></div>
          </div>
          <div id="regUploadAvatarPanel" style="display:none;text-align:center">
            <div class="upload-avatar-area" id="regUploadArea" onclick="document.getElementById('regAvatarFile').click()">
              <div style="text-align:center;color:var(--sumi-light);font-family:'Noto Serif JP',serif;font-size:11px"><div style="font-size:32px;margin-bottom:6px">📷</div>タップして選択</div>
              <img id="regAvatarPreview" src="" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:cover">
            </div>
            <input type="file" id="regAvatarFile" accept="image/*" style="display:none" onchange="onAvatarFile(event,'reg')">
          </div>
        </div>

        <button class="btn-primary" id="regSaveBtn" style="width:100%;justify-content:center;margin-top:4px" onclick="register()">
          登 録
        </button>
      </div>

      <!-- ログインフォーム -->
      <div id="loginForm" style="display:none">
        <div class="form-group">
          <label class="form-label">ニックネーム または メールアドレス</label>
          <input class="form-input" id="loginIdentifier" type="text" placeholder="例：おひさまファン" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">パスワード</label>
          <div class="password-wrap">
            <input class="form-input" id="loginPassword" type="password" placeholder="パスワードを入力" autocomplete="current-password">
            <button class="password-toggle" type="button" onclick="togglePw('loginPassword',this)">👁</button>
          </div>
        </div>
        <button class="btn-primary" id="loginBtn" style="width:100%;justify-content:center;margin-top:4px" onclick="login()">
          ログイン
        </button>
      </div>
    </div>

    <!-- ━━━ ログイン済み：プロフィール編集カード ━━━ -->
    <div class="profile-card" id="editCard" style="display:none">
      <div class="profile-card-title">✿ プロフィール編集</div>
      <div class="form-group">
        <label class="form-label">ニックネーム</label>
        <input class="form-input" id="editNickname" type="text" maxlength="50">
      </div>
      <div class="form-group">
        <label class="form-label">メールアドレス（任意）</label>
        <input class="form-input" id="editEmail" type="email">
      </div>

      <!-- アイコン設定 -->
      <div class="form-group">
        <label class="form-label">アイコン設定</label>
        <div class="avatar-tabs">
          <button class="avatar-tab active" id="editAvatarTabMember" onclick="switchAvatarTab('member','edit',this)">メンバーから選ぶ</button>
          <button class="avatar-tab"        id="editAvatarTabUpload" onclick="switchAvatarTab('upload','edit',this)">写真をアップロード</button>
        </div>
        <div id="editMemberAvatarPanel">
          <div class="member-avatar-grid" id="editMemberGrid"></div>
        </div>
        <div id="editUploadAvatarPanel" style="display:none;text-align:center">
          <div class="upload-avatar-area" id="editUploadArea" onclick="document.getElementById('editAvatarFile').click()">
            <div style="text-align:center;color:var(--sumi-light);font-family:'Noto Serif JP',serif;font-size:11px"><div style="font-size:32px;margin-bottom:6px">📷</div>タップして選択</div>
            <img id="editAvatarPreview" src="" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:cover">
          </div>
          <input type="file" id="editAvatarFile" accept="image/*" style="display:none" onchange="onAvatarFile(event,'edit')">
        </div>
      </div>

      <button class="btn-primary" id="editSaveBtn" style="width:100%;justify-content:center;margin-top:4px" onclick="saveProfile()">
        保 存
      </button>

      <!-- パスワード変更 -->
      <div style="margin-top:14px">
        <button style="background:none;border:none;color:var(--sky);font-family:'Noto Serif JP',serif;font-size:12px;cursor:pointer;text-decoration:underline;touch-action:manipulation" onclick="togglePwChange()">
          🔑 パスワードを変更する
        </button>
        <div class="pw-change-wrap" id="pwChangeWrap">
          <div class="form-group">
            <label class="form-label">現在のパスワード</label>
            <div class="password-wrap">
              <input class="form-input" id="curPassword" type="password" placeholder="現在のパスワード" autocomplete="current-password">
              <button class="password-toggle" type="button" onclick="togglePw('curPassword',this)">👁</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">新しいパスワード（4文字以上）</label>
            <div class="password-wrap">
              <input class="form-input" id="newPassword" type="password" placeholder="新しいパスワード" autocomplete="new-password">
              <button class="password-toggle" type="button" onclick="togglePw('newPassword',this)">👁</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">新しいパスワード（確認）</label>
            <div class="password-wrap">
              <input class="form-input" id="newPasswordConfirm" type="password" placeholder="もう一度入力" autocomplete="new-password">
              <button class="password-toggle" type="button" onclick="togglePw('newPasswordConfirm',this)">👁</button>
            </div>
          </div>
          <button class="btn-primary" style="width:100%;justify-content:center;background:linear-gradient(135deg,#4060c0,#2040a0)" onclick="changePassword()">
            パスワードを変更する
          </button>
        </div>
      </div>
    </div>

    <!-- ログアウト -->
    <div class="profile-card" id="logoutCard" style="display:none">
      <div class="profile-card-title">⚙ アカウント操作</div>
      <button class="btn-danger" onclick="logout()">ログアウト</button>
    </div>

    <!-- 共有機能の説明 -->
    <div class="profile-card">
      <div class="profile-card-title">📋 共有機能について</div>
      <div style="font-family:'Noto Serif JP',serif;font-size:12px;color:var(--sumi-light);line-height:1.9">
        <p>✿ <b>プライベート</b>：自分だけが見られます</p>
        <p>✿ <b>全体公開</b>：アプリを使う全員が見られます</p>
        <p>✿ <b>特定共有</b>：選んだユーザーだけが見られます</p>
        <br>
        <p style="font-size:11px">アカウントを登録・ログインすると、イベントや写真を他のユーザーと共有できます。</p>
      </div>
    </div>

  </div>
</div>

<script src="data.js"></script>
<script src="db.js"></script>
<script src="api.js"></script>
<script src="nav.js"></script>
<script src="sakura.js"></script>
<script>
document.getElementById('headerMount').outerHTML = headerHTML('アカウント設定', '✿ プロフィール設定 ✿');
injectNav('profile.html');

// 状態変数
let regSelectedAvatar  = null;
let regUploadedDataUrl = null;
let editSelectedAvatar  = null;
let editUploadedDataUrl = null;
let curAvatarTab = { reg: 'member', edit: 'member' };

// ── タブ切替（登録/ログイン）─────────────
document.getElementById('tabRegister').addEventListener('click', function() {
  this.classList.add('active');
  document.getElementById('tabLogin').classList.remove('active');
  document.getElementById('registerForm').style.display = 'block';
  document.getElementById('loginForm').style.display    = 'none';
});
document.getElementById('tabLogin').addEventListener('click', function() {
  this.classList.add('active');
  document.getElementById('tabRegister').classList.remove('active');
  document.getElementById('registerForm').style.display = 'none';
  document.getElementById('loginForm').style.display    = 'block';
});

// ── 初期化 ──────────────────────────────
(function init() {
  buildMemberGrid('reg');
  buildMemberGrid('edit');

  const user = getUser();
  if (user) {
    showLoggedIn(user);
  }
})();

function showLoggedIn(user) {
  updateHero(user);
  document.getElementById('authCard').style.display   = 'none';
  document.getElementById('editCard').style.display   = 'block';
  document.getElementById('logoutCard').style.display = 'block';
  document.getElementById('editNickname').value = user.nickname || '';
  document.getElementById('editEmail').value    = user.email    || '';
  // 既存アバター復元
  if (user.avatar_url) {
    if (user.avatar_type === 'member') {
      editSelectedAvatar = user.avatar_url;
      document.querySelectorAll('#editMemberGrid .member-avatar-cell').forEach(c => {
        if (c.dataset.src === user.avatar_url) c.classList.add('selected');
      });
    } else {
      editUploadedDataUrl = user.avatar_url;
      const preview = document.getElementById('editAvatarPreview');
      preview.src = user.avatar_url; preview.style.display = 'block';
    }
  }
}

function updateHero(user) {
  document.getElementById('heroName').textContent  = user.nickname || 'ゲスト';
  document.getElementById('heroEmail').textContent = user.email    || 'メール未設定';
  document.getElementById('loginBadge').textContent = '✿ 設定済み ✿';
  const heroAvatar = document.getElementById('heroAvatar');
  if (user.avatar_url) {
    heroAvatar.innerHTML = `<img src="${user.avatar_url}" alt="${user.nickname}"><div class="profile-avatar-edit">✎</div>`;
  }
}

function scrollToForm() {
  const target = isLoggedIn()
    ? document.getElementById('editCard')
    : document.getElementById('authCard');
  target.scrollIntoView({ behavior: 'smooth' });
}

// ── アバター関連 ──────────────────────────
function buildMemberGrid(prefix) {
  const grid = document.getElementById(`${prefix}MemberGrid`);
  grid.innerHTML = ACTIVE_MEMBERS.filter(m => m.enabled !== false).map(m => {
    const src   = m.avatar || '';
    const isImg = /\.(png|jpg|jpeg|gif|webp|svg)$/i.test(src);
    return `<div class="member-avatar-cell" data-src="${src}" data-name="${m.name}" data-prefix="${prefix}" onclick="selectMemberAvatar('${src}','${m.name}','${prefix}',this)">
      ${isImg ? `<img src="${src}" alt="${m.name}" onerror="this.style.display='none'">` : `<span style="font-size:22px">${src||'🌻'}</span>`}
      <span>${m.name.split(' ')[0]}</span>
    </div>`;
  }).join('');
}

function switchAvatarTab(tab, prefix, btn) {
  curAvatarTab[prefix] = tab;
  document.querySelectorAll(`#${prefix}AvatarTab${tab.charAt(0).toUpperCase()+tab.slice(1)}`).forEach(b => b.classList.add('active'));
  const otherTab = tab === 'member' ? 'upload' : 'member';
  const otherBtn = document.getElementById(`${prefix}AvatarTab${otherTab.charAt(0).toUpperCase()+otherTab.slice(1)}`);
  if (otherBtn) otherBtn.classList.remove('active');
  btn.classList.add('active');
  document.getElementById(`${prefix}MemberAvatarPanel`).style.display = tab === 'member' ? 'block' : 'none';
  document.getElementById(`${prefix}UploadAvatarPanel`).style.display = tab === 'upload' ? 'block' : 'none';
}

function selectMemberAvatar(src, name, prefix, el) {
  if (prefix === 'reg') { regSelectedAvatar = src; regUploadedDataUrl = null; }
  else { editSelectedAvatar = src; editUploadedDataUrl = null; }
  document.querySelectorAll(`#${prefix}MemberGrid .member-avatar-cell`).forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  updateHeroPreview(src, name);
}

function onAvatarFile(e, prefix) {
  const file = e.target.files[0];
  if (!file) return;
  fileToBase64(file).then(dataUrl => {
    if (prefix === 'reg') { regUploadedDataUrl = dataUrl; regSelectedAvatar = null; }
    else { editUploadedDataUrl = dataUrl; editSelectedAvatar = null; }
    const preview = document.getElementById(`${prefix}AvatarPreview`);
    preview.src = dataUrl; preview.style.display = 'block';
    updateHeroPreview(dataUrl, '');
  }).catch(() => alert('画像の読み込みに失敗しました'));
}

function updateHeroPreview(src, name) {
  document.getElementById('heroAvatar').innerHTML = `<img src="${src}" alt="${name}"><div class="profile-avatar-edit">✎</div>`;
}

// ── パスワード表示/非表示 ─────────────────
function togglePw(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') { input.type = 'text';     btn.textContent = '🙈'; }
  else                           { input.type = 'password'; btn.textContent = '👁'; }
}

function togglePwChange() {
  document.getElementById('pwChangeWrap').classList.toggle('open');
}

// ── 新規登録 ──────────────────────────────
async function register() {
  const nickname = document.getElementById('regNickname').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const confirm  = document.getElementById('regPasswordConfirm').value;

  if (!nickname) { alert('ニックネームを入力してください'); return; }
  if (!password || password.length < 4) { alert('パスワードは4文字以上で入力してください'); return; }
  if (password !== confirm) { alert('パスワードが一致しません'); return; }

  const avatarUrl  = regUploadedDataUrl || regSelectedAvatar || null;
  const avatarType = regUploadedDataUrl ? 'upload' : 'member';

  const btn = document.getElementById('regSaveBtn');
  btn.disabled = true; btn.textContent = '登録中…';
  try {
    const result = await UserAPI.register(nickname, email, password, avatarUrl, avatarType);
    if (result) {
      showLoggedIn(result.user);
      alert(`✿ ようこそ、${result.user.nickname} さん！`);
    }
  } catch (err) {
    alert('登録エラー: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = '登 録';
  }
}

// ── ログイン ──────────────────────────────
async function login() {
  const identifier = document.getElementById('loginIdentifier').value.trim();
  const password   = document.getElementById('loginPassword').value;
  if (!identifier) { alert('ニックネームまたはメールアドレスを入力してください'); return; }
  if (!password)   { alert('パスワードを入力してください'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'ログイン中…';
  try {
    const result = await UserAPI.login(identifier, password);
    if (result) {
      showLoggedIn(result.user);
      alert(`✿ ${result.user.nickname} でログインしました！`);
    }
  } catch (err) {
    alert('ログインエラー: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'ログイン';
  }
}

// ── プロフィール保存 ──────────────────────
async function saveProfile() {
  const nickname = document.getElementById('editNickname').value.trim();
  const email    = document.getElementById('editEmail').value.trim();
  if (!nickname) { alert('ニックネームを入力してください'); return; }

  const avatarUrl  = editUploadedDataUrl || editSelectedAvatar || null;
  const avatarType = editUploadedDataUrl ? 'upload' : 'member';

  const btn = document.getElementById('editSaveBtn');
  btn.disabled = true; btn.textContent = '保存中…';
  try {
    const result = await UserAPI.update(nickname, email, avatarUrl, avatarType);
    if (result) {
      updateHero(result.user);
      btn.textContent = '✅ 保存しました';
      setTimeout(() => { btn.textContent = '保 存'; }, 2000);
    }
  } catch (err) {
    alert('保存エラー: ' + err.message);
    btn.textContent = '保 存';
  } finally {
    btn.disabled = false;
  }
}

// ── パスワード変更 ────────────────────────
async function changePassword() {
  const curPw  = document.getElementById('curPassword').value;
  const newPw  = document.getElementById('newPassword').value;
  const newPw2 = document.getElementById('newPasswordConfirm').value;
  if (!curPw)  { alert('現在のパスワードを入力してください'); return; }
  if (!newPw || newPw.length < 4) { alert('新しいパスワードは4文字以上にしてください'); return; }
  if (newPw !== newPw2) { alert('新しいパスワードが一致しません'); return; }

  const nickname = document.getElementById('editNickname').value.trim();
  const email    = document.getElementById('editEmail').value.trim();
  const avatarUrl  = editUploadedDataUrl || editSelectedAvatar || null;
  const avatarType = editUploadedDataUrl ? 'upload' : 'member';

  try {
    const result = await UserAPI.update(nickname, email, avatarUrl, avatarType, curPw, newPw);
    if (result) {
      alert('✅ パスワードを変更しました');
      document.getElementById('curPassword').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('newPasswordConfirm').value = '';
      document.getElementById('pwChangeWrap').classList.remove('open');
    }
  } catch (err) { alert('エラー: ' + err.message); }
}

// ── ログアウト ────────────────────────────
function logout() {
  if (!confirm('ログアウトしますか？\nデータはサーバーに保存されているので、次回ログインで復元されます。')) return;
  removeToken();
  // UIをゲスト状態に戻す
  document.getElementById('heroName').textContent  = 'ゲスト';
  document.getElementById('heroEmail').textContent = 'アカウント未設定';
  document.getElementById('loginBadge').textContent = '✿ タップして設定 ✿';
  document.getElementById('heroAvatar').innerHTML = '<span class="profile-avatar-placeholder">🌸</span><div class="profile-avatar-edit">✎</div>';
  document.getElementById('authCard').style.display   = 'block';
  document.getElementById('editCard').style.display   = 'none';
  document.getElementById('logoutCard').style.display = 'none';
  // ログインタブに切替
  document.getElementById('tabLogin').click();
}
