<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>日向坂46 — フォトギャラリー</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#8b2252">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="日向坂46">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
<script src="pwa-check.js"></script>
<style>
.filter-scroll {
  display: flex; gap: 8px; overflow-x: auto;
  padding-bottom: 4px; scrollbar-width: none; margin-bottom: 16px;
}
.filter-scroll::-webkit-scrollbar { display: none; }
.filter-chip {
  flex-shrink: 0; padding: 7px 14px; border-radius: 20px;
  border: 1.5px solid var(--hina-2); background: rgba(255,255,255,0.78);
  font-family: 'Noto Serif JP', serif; font-size: 11px; font-weight: 600;
  color: var(--sumi-light); cursor: pointer; transition: all 0.18s; white-space: nowrap;
}
.filter-chip.active { background: var(--sky); border-color: var(--sky); color: white; box-shadow: 0 3px 12px rgba(139,34,82,0.28); }
.filter-chip:active { transform: scale(0.94); }

.photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; margin-bottom: 100px; }
.photo-cell {
  aspect-ratio: 1; overflow: hidden; border-radius: 8px;
  cursor: pointer; position: relative; background: var(--hina-1);
}
.photo-cell img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.22s; display: block; }
.photo-cell:active img { transform: scale(0.94); }
.photo-cell-tag {
  position: absolute; bottom: 4px; left: 4px;
  background: rgba(42,31,26,0.58); color: white; font-size: 9px;
  padding: 2px 6px; border-radius: 8px; font-family: 'Noto Serif JP', serif;
  max-width: calc(100% - 8px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; pointer-events: none;
}
/* 共有写真バッジ */
.photo-share-badge {
  position: absolute; top: 4px; right: 4px;
  background: rgba(21,101,160,0.8); color: white; font-size: 8px;
  padding: 2px 5px; border-radius: 6px; pointer-events: none;
}

.fab {
  position: fixed; bottom: 28px; right: 22px;
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--sky); color: white; font-size: 26px; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 24px rgba(139,34,82,0.38); z-index: 50; transition: transform 0.18s;
}
.fab:active { transform: scale(0.9); }

.count-badge { font-family: 'Noto Serif JP', serif; font-size: 11px; color: var(--sumi-light); margin-bottom: 12px; letter-spacing: 0.06em; }

/* ビューア */
.viewer-overlay { display: none; position: fixed; inset: 0; background: rgba(10,6,4,0.96); z-index: 500; flex-direction: column; align-items: center; justify-content: center; }
.viewer-overlay.open { display: flex; }
.viewer-img-wrap { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; padding: 16px; overflow: hidden; }
.viewer-img { max-width: 100%; max-height: 100%; border-radius: 10px; object-fit: contain; user-select: none; }
.viewer-bar { width: 100%; padding: 14px 20px 36px; display: flex; align-items: center; gap: 12px; background: rgba(20,10,8,0.7); }
.viewer-info { flex: 1; }
.viewer-member { font-family: 'Shippori Mincho', serif; font-size: 14px; font-weight: 700; color: white; margin-bottom: 2px; }
.viewer-caption { font-family: 'Noto Serif JP', serif; font-size: 11px; color: rgba(255,255,255,0.6); }
.viewer-delete { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; width: 38px; height: 38px; color: rgba(255,255,255,0.7); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0; }
.viewer-delete:active { background: rgba(200,60,80,0.5); }
.viewer-close { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; color: white; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.viewer-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.12); border: none; color: white; font-size: 22px; width: 40px; height: 60px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.viewer-nav:active { background: rgba(255,255,255,0.25); }
.viewer-nav.prev { left: 8px; }
.viewer-nav.next { right: 8px; }
.viewer-nav:disabled { opacity: 0.2; pointer-events: none; }

/* 追加モーダル */
.add-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(42,31,26,0.55); backdrop-filter: blur(10px); z-index: 300; align-items: flex-end; justify-content: center; }
.add-modal-overlay.open { display: flex; }
.add-modal { background: var(--white-bg); border-radius: 32px 32px 0 0; padding: 26px 22px 44px; width: 100%; max-width: 430px; max-height: 90vh; overflow-y: auto; border-top: 1.5px solid var(--hina-2); position: relative; animation: slideUp 0.32s cubic-bezier(0.34,1.4,0.64,1); }

.photo-preview-wrap { width: 100%; aspect-ratio: 4/3; border-radius: 16px; border: 2px dashed var(--hina-3); background: var(--hina-0); display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; margin-bottom: 14px; transition: border-color 0.2s; position: relative; }
.photo-preview-wrap.has-img { border-style: solid; }
.photo-preview-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 14px; }
.photo-preview-placeholder { text-align: center; color: var(--sumi-light); pointer-events: none; }
.photo-preview-placeholder-icon { font-size: 36px; margin-bottom: 8px; }
.photo-preview-placeholder-text { font-family: 'Noto Serif JP',serif; font-size: 12px; letter-spacing: 0.06em; }
#photoFileInput { display: none; }

.member-select-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 6px; }
.member-select-chip { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 4px; border-radius: 14px; border: 1.5px solid var(--hina-2); background: rgba(255,255,255,0.7); cursor: pointer; transition: all 0.15s; font-size: 10px; font-family: 'Noto Serif JP', serif; color: var(--sumi-light); text-align: center; line-height: 1.3; }
.member-select-chip.selected { border-color: var(--sky); background: var(--hina-1); color: var(--sky); font-weight: 700; }
.member-select-chip:active { transform: scale(0.94); }
.member-chip-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; overflow: hidden; }
.member-chip-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }

/* 共有タブ（モーダル内）*/
.share-tabs { display: flex; gap: 0; margin-bottom: 16px; border: 1.5px solid var(--hina-2); border-radius: 16px; overflow: hidden; background: rgba(255,255,255,0.5); }
.share-tab { flex: 1; padding: 11px 8px; text-align: center; font-family: 'Noto Serif JP', serif; font-size: 12px; font-weight: 600; color: var(--sumi-light); cursor: pointer; transition: all 0.18s; border: none; background: none; }
.share-tab.active { background: var(--sky); color: white; font-weight: 700; }

.share-scope-row { display: flex; gap: 8px; margin-bottom: 14px; }
.share-scope-btn { flex: 1; padding: 10px 8px; border-radius: 14px; border: 1.5px solid var(--hina-2); background: rgba(255,255,255,0.75); font-family: 'Noto Serif JP', serif; font-size: 11px; font-weight: 600; color: var(--sumi-light); cursor: pointer; text-align: center; transition: all 0.18s; }
.share-scope-btn.active { background: var(--hina-1); border-color: var(--hina-3); color: var(--sky); }

.user-select-list { display: flex; flex-direction: column; gap: 6px; max-height: 180px; overflow-y: auto; border: 1.5px solid var(--hina-2); border-radius: 14px; padding: 8px; background: rgba(255,255,255,0.5); }
.user-select-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px; cursor: pointer; transition: background 0.15s; }
.user-select-item:hover { background: var(--hina-1); }
.user-select-item.selected { background: var(--hina-1); }
.user-select-item input[type=checkbox] { width:16px; height:16px; cursor:pointer; accent-color: var(--sky); }
.user-select-name { font-family: 'Noto Serif JP', serif; font-size: 13px; font-weight: 600; color: var(--sumi); flex: 1; }

/* vis バッジ */
.vis-badge { display: inline-block; padding: 1px 7px; border-radius: 9px; font-size: 9px; font-weight: 700; font-family: 'Noto Serif JP', serif; }
.vis-private  { background: rgba(100,100,100,0.08); color: #777; border: 1px solid #ddd; }
.vis-public   { background: rgba(21,101,160,0.08);  color: var(--sky); border: 1px solid var(--hina-2); }
.vis-specific { background: rgba(80,160,80,0.1);    color: #3a7a3a; border: 1px solid rgba(80,160,80,0.3); }
</style>
</head>
<body>
<canvas id="petals-canvas"></canvas>
<div id="app">
  <div id="headerMount"></div>
  <div class="page-content page-enter">
    <div class="section-kamon" style="margin-top:4px">
      <span class="section-kamon-text">☀ フォトギャラリー ☀</span>
    </div>
    <div class="filter-scroll" id="filterScroll"></div>
    <div class="count-badge" id="countBadge"></div>
    <div class="photo-grid" id="photoGrid"></div>
    <div id="emptyState" style="display:none">
      <div class="empty-state">
        <div class="empty-state-icon">📷</div>
        <div class="empty-state-text">写真がまだありません<br>＋ボタンから追加しましょう</div>
      </div>
    </div>
  </div>
</div>

<button class="fab" onclick="openAddModal()" aria-label="写真を追加" style="-webkit-appearance:none;touch-action:manipulation">＋</button>

<!-- 全画面ビューア -->
<div class="viewer-overlay" id="viewerOverlay">
  <button class="viewer-close" onclick="closeViewer()">✕</button>
  <div class="viewer-img-wrap">
    <img class="viewer-img" id="viewerImg" src="" alt="">
  </div>
  <button class="viewer-nav prev" id="viewerPrev" onclick="viewerStep(-1)">‹</button>
  <button class="viewer-nav next" id="viewerNext" onclick="viewerStep(1)">›</button>
  <div class="viewer-bar">
    <div class="viewer-info">
      <div class="viewer-member" id="viewerMember"></div>
      <div class="viewer-caption" id="viewerCaption"></div>
    </div>
    <button class="viewer-delete" id="viewerDeleteBtn" onclick="deleteCurrentPhoto()" title="削除">🗑</button>
  </div>
</div>

<!-- 追加モーダル -->
<div class="add-modal-overlay" id="addModal" onclick="closeAddModal(event)">
  <div class="add-modal">
    <div class="modal-handle"></div>
    <button class="modal-close-btn" onclick="document.getElementById('addModal').classList.remove('open')">✕</button>
    <div class="modal-title">写真を記す ☀</div>

    <!-- プライベート / 共有タブ -->
    <div class="share-tabs" id="photoShareTabs">
      <button class="share-tab active" onclick="setPhotoShareTab('private',this)">🔒 プライベート</button>
      <button class="share-tab"        onclick="setPhotoShareTab('shared',this)">🌐 共 有</button>
    </div>

    <!-- 共有設定 -->
    <div id="photoSharePanel" style="display:none;margin-bottom:14px">
      <div class="share-scope-row">
        <button class="share-scope-btn active" onclick="setPhotoShareScope('public',this)">🌐 全 体</button>
        <button class="share-scope-btn"        onclick="setPhotoShareScope('specific',this)">👥 特 定</button>
      </div>
      <div id="photoSpecificUsersPanel" style="display:none">
        <div style="font-family:'Noto Serif JP',serif;font-size:11px;color:var(--sumi-light);margin-bottom:6px">共有するユーザーを選択</div>
        <div class="user-select-list" id="photoUserSelectList"></div>
      </div>
    </div>

    <!-- 写真選択（複数枚対応） -->
    <div style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <label class="form-label" style="margin-bottom:0">写真を選択（複数枚OK）</label>
        <span id="photoCountBadge" style="font-family:'Noto Serif JP',serif;font-size:11px;color:var(--sky);font-weight:700"></span>
      </div>
      <!-- プレビューグリッド -->
      <div id="multiPreviewGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px"></div>
      <!-- 追加ボタン -->
      <div id="addMoreBtn" style="border:2px dashed var(--hina-3);border-radius:14px;padding:18px;text-align:center;cursor:pointer;background:var(--hina-0);touch-action:manipulation" onclick="document.getElementById('photoFileInput').click()">
        <div style="font-size:28px;margin-bottom:4px">📷</div>
        <div style="font-family:'Noto Serif JP',serif;font-size:12px;color:var(--sumi-light)">タップして写真を選択（複数可）</div>
      </div>
    </div>
    <input type="file" id="photoFileInput" accept="image/*" multiple style="display:none" onchange="onFileSelect(event)">

    <!-- メンバータグ -->
    <div class="form-group">
      <label class="form-label">メンバーをタグ付け（任意）</label>
      <div class="member-select-grid" id="memberSelectGrid"></div>
    </div>

    <!-- キャプション -->
    <div class="form-group">
      <label class="form-label">キャプション（任意）</label>
      <input class="form-input" id="photoCaption" type="text" placeholder="例：握手会にて ・ お誕生日おめでとう…">
    </div>

    <button class="btn-primary" id="photoSaveBtn" style="width:100%;margin-top:8px;justify-content:center" onclick="addPhoto()">保 存</button>
  </div>
</div>

<script src="data.js"></script>
<script src="db.js"></script>
<script src="api.js"></script>
<script src="nav.js"></script>
<script src="sakura.js"></script>
<script>
document.getElementById('headerMount').outerHTML = headerHTML('ギャラリー', '☀ フォトギャラリー ☀');
injectNav('gallery.html');

var allPhotos      = [];
var filteredPhotos = [];
var curFilter      = 'all';
var viewerIndex    = 0;
var selectedMemberId     = null;
var pendingPhotos        = [];
var curPhotoShareMode    = 'private';
var selectedPhotoUserIds = {};
var allUsers = [];

// ── フィルター構築 ──────────────────────
function buildFilters() {
  var memberIds = [];
  allPhotos.forEach(function(p) { if (p.memberId && memberIds.indexOf(String(p.memberId)) === -1) memberIds.push(String(p.memberId)); });
  var members = ACTIVE_MEMBERS.filter(function(m) { return memberIds.indexOf(String(m.id)) !== -1; });
  var el = document.getElementById('filterScroll');
  var chips = [];
  var filterDefs = [
    {id:'all',label:'すべて'},
    {id:'mine',label:'自分の写真'},
    {id:'shared',label:'共有写真'}
  ];
  filterDefs.forEach(function(f) {
    chips.push('<button class="filter-chip' + (curFilter===f.id?' active':'') + '" data-filter="' + f.id + '">' + f.label + '</button>');
  });
  members.forEach(function(m) {
    var isImg = m.avatar && /\.(png|jpg|jpeg|gif|webp|svg)$/i.test(m.avatar);
    var av = isImg ? ('<img src="' + m.avatar + '" style="width:16px;height:16px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:3px">') : (m.avatar + ' ');
    chips.push('<button class="filter-chip' + (curFilter===String(m.id)?' active':'') + '" data-filter="' + m.id + '">' + av + m.name + '</button>');
  });
  el.innerHTML = chips.join('');
  // イベントをdelegationで設定
  el.querySelectorAll('.filter-chip').forEach(function(btn) {
    btn.addEventListener('click', function() { setFilter(this.dataset.filter, this); });
    btn.addEventListener('touchend', function(e) { e.preventDefault(); setFilter(this.dataset.filter, this); }, {passive:false});
  });
}

function setFilter(id, btn) {
  curFilter = id;
  document.querySelectorAll('.filter-chip').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  if (curFilter === 'all')         filteredPhotos = allPhotos.slice();
  else if (curFilter === 'mine')   filteredPhotos = allPhotos.filter(function(p) { return p.isOwn; });
  else if (curFilter === 'shared') filteredPhotos = allPhotos.filter(function(p) { return !p.isOwn || p.visibility !== 'private'; });
  else filteredPhotos = allPhotos.filter(function(p) { return String(p.memberId) === String(curFilter); });
  renderGrid();
}

// ── グリッド描画 ──────────────────────────
function renderGrid() {
  var grid  = document.getElementById('photoGrid');
  var empty = document.getElementById('emptyState');
  document.getElementById('countBadge').textContent = '✿ ' + filteredPhotos.length + '枚';
  if (!filteredPhotos.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = filteredPhotos.map(function(p, i) {
    var tag = p.memberName || '';
    return '<div class="photo-cell" onclick="openViewer(' + i + ')">'
      + '<img src="' + p.dataUrl + '" alt="' + tag + '" loading="lazy">'
      + (tag ? '<div class="photo-cell-tag">' + tag + '</div>' : '')
      + (!p.isOwn ? '<div class="photo-share-badge">共有</div>' : '')
      + '</div>';
  }).join('');
}

// ── ビューワー ────────────────────────────
function openViewer(idx) {
  viewerIndex = idx;
  showViewerPhoto();
  document.getElementById('viewerOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function showViewerPhoto() {
  var p = filteredPhotos[viewerIndex];
  document.getElementById('viewerImg').src = p.dataUrl;
  document.getElementById('viewerMember').textContent = (p.memberName || '未タグ') + (p.ownerNickname && !p.isOwn ? ' ✿ ' + p.ownerNickname : '');
  document.getElementById('viewerCaption').textContent = p.caption || '';
  document.getElementById('viewerPrev').disabled = viewerIndex === 0;
  document.getElementById('viewerNext').disabled = viewerIndex === filteredPhotos.length - 1;
  document.getElementById('viewerDeleteBtn').style.display = p.isOwn !== false ? '' : 'none';
}

function viewerStep(dir) {
  var n = viewerIndex + dir;
  if (n < 0 || n >= filteredPhotos.length) return;
  viewerIndex = n; showViewerPhoto();
}

function closeViewer() {
  document.getElementById('viewerOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// スワイプ
var touchStartX = 0;
document.getElementById('viewerOverlay').addEventListener('touchstart', function(e) { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
document.getElementById('viewerOverlay').addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(dx) > 50) viewerStep(dx < 0 ? 1 : -1);
}, { passive: true });

function deleteCurrentPhoto() {
  if (!confirm('この写真を削除しますか？')) return;
  var p = filteredPhotos[viewerIndex];
  PhotoAPI.delete(p.id).then(function() {
    allPhotos = allPhotos.filter(function(x) { return x.id !== p.id; });
    applyFilter(); buildFilters();
    if (!filteredPhotos.length) { closeViewer(); return; }
    viewerIndex = Math.min(viewerIndex, filteredPhotos.length - 1);
    showViewerPhoto();
  }).catch(function(err) { alert('削除エラー: ' + err.message); });
}

// ── 追加モーダル ──────────────────────────
function openAddModal() {
  pendingPhotos = []; selectedMemberId = null;
  curPhotoShareMode = 'private'; selectedPhotoUserIds = {};
  document.getElementById('photoCaption').value = '';
  document.getElementById('photoFileInput').value = '';
  renderPendingPreviews();
  document.querySelectorAll('.share-tab').forEach(function(b, i) { b.classList.toggle('active', i===0); });
  document.getElementById('photoSharePanel').style.display = 'none';
  document.getElementById('photoShareTabs').style.display = isLoggedIn() ? '' : 'none';

  // メンバーグリッド
  document.getElementById('memberSelectGrid').innerHTML = ACTIVE_MEMBERS.map(function(m) {
    var isImg = m.avatar && /\.(png|jpg|jpeg|gif|webp|svg)$/i.test(m.avatar);
    var avHtml = isImg ? '<img src="' + m.avatar + '" alt="' + m.name + '">' : '<span style="font-size:18px">' + m.avatar + '</span>';
    return '<div class="member-select-chip" data-id="' + m.id + '" onclick="selectMember(' + m.id + ',this)">'
      + '<div class="member-chip-avatar">' + avHtml + '</div>'
      + '<span>' + m.name.split(' ')[0] + '</span></div>';
  }).join('');

  document.getElementById('addModal').classList.add('open');
  document.body.style.overflow = 'hidden';

  if (isLoggedIn()) {
    UserAPI.list().then(function(u) { allUsers = u || []; }).catch(function() { allUsers = []; });
  }
}

function closeAddModal(e) {
  if (e && e.target !== document.getElementById('addModal')) return;
  document.getElementById('addModal').classList.remove('open');
  document.body.style.overflow = '';
}

function selectMember(id, el) {
  selectedMemberId = selectedMemberId === id ? null : id;
  document.querySelectorAll('.member-select-chip').forEach(function(c) { c.classList.remove('selected'); });
  if (selectedMemberId !== null) el.classList.add('selected');
}

function onFileSelect(e) {
  var files = Array.from(e.target.files);
  if (!files.length) return;
  if (pendingPhotos.length + files.length > 20) {
    alert('一度に登録できるのは20枚までです（現在' + pendingPhotos.length + '枚選択済み）');
    e.target.value = ''; return;
  }
  var addBtn = document.getElementById('addMoreBtn');
  addBtn.innerHTML = '<div style="font-size:20px;margin-bottom:4px">⏳</div><div style="font-family:sans-serif;font-size:12px;color:var(--sumi-light)">読み込み中…</div>';

  var promises = files.map(function(file) {
    return new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onload = function(ev) { resolve({ dataUrl: ev.target.result, name: file.name }); };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  });

  Promise.all(promises).then(function(newPhotos) {
    pendingPhotos = pendingPhotos.concat(newPhotos);
    e.target.value = '';
    renderPendingPreviews();
  }).catch(function() {
    alert('画像の読み込みに失敗しました');
    renderPendingPreviews();
  });
}

function renderPendingPreviews() {
  var grid    = document.getElementById('multiPreviewGrid');
  var badge   = document.getElementById('photoCountBadge');
  var addBtn  = document.getElementById('addMoreBtn');
  var saveBtn = document.getElementById('photoSaveBtn');
  badge.textContent = pendingPhotos.length > 0 ? pendingPhotos.length + '枚選択中' : '';
  if (!pendingPhotos.length) {
    grid.innerHTML = '';
    addBtn.innerHTML = '<div style="font-size:28px;margin-bottom:4px">📷</div><div style="font-family:sans-serif;font-size:12px;color:var(--sumi-light)">タップして写真を選択（複数可）</div>';
    addBtn.style.display = 'block'; saveBtn.textContent = '保 存'; return;
  }
  grid.innerHTML = pendingPhotos.map(function(p, i) {
    return '<div style="position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--hina-1)">'
      + '<img src="' + p.dataUrl + '" style="width:100%;height:100%;object-fit:cover;display:block">'
      + '<button onclick="removePending(' + i + ')" style="position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.65);border:none;color:white;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;padding:0">✕</button>'
      + '</div>';
  }).join('');
  if (pendingPhotos.length < 20) {
    addBtn.style.display = 'block';
    addBtn.innerHTML = '<div style="font-size:24px;margin-bottom:4px">➕</div><div style="font-family:sans-serif;font-size:12px;color:var(--sumi-light)">さらに追加する</div>';
  } else { addBtn.style.display = 'none'; }
  saveBtn.textContent = pendingPhotos.length + '枚を保存';
}

function removePending(idx) { pendingPhotos.splice(idx, 1); renderPendingPreviews(); }

function setPhotoShareTab(mode, btn) {
  document.querySelectorAll('.share-tab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  curPhotoShareMode = mode === 'private' ? 'private' : 'public';
  document.getElementById('photoSharePanel').style.display = mode === 'private' ? 'none' : 'block';
  if (mode !== 'private') {
    document.querySelectorAll('.share-scope-btn').forEach(function(b, i) { b.classList.toggle('active', i===0); });
    document.getElementById('photoSpecificUsersPanel').style.display = 'none';
  }
}

function setPhotoShareScope(scope, btn) {
  document.querySelectorAll('.share-scope-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active'); curPhotoShareMode = scope;
  document.getElementById('photoSpecificUsersPanel').style.display = scope === 'specific' ? 'block' : 'none';
  if (scope === 'specific') buildPhotoUserSelectList();
}

function buildPhotoUserSelectList() {
  var myId = getUser() ? getUser().id : null;
  var others = allUsers.filter(function(u) { return u.id !== myId; });
  var list = document.getElementById('photoUserSelectList');
  if (!others.length) { list.innerHTML = '<div style="padding:12px;text-align:center;font-size:12px;color:var(--sumi-light)">他のユーザーがいません</div>'; return; }
  list.innerHTML = others.map(function(u) {
    var av = u.avatar_url
      ? '<img src="' + u.avatar_url + '" style="width:32px;height:32px;border-radius:50%;object-fit:cover">'
      : '<div style="width:32px;height:32px;border-radius:50%;background:var(--hina-1);display:flex;align-items:center;justify-content:center;font-size:16px">👤</div>';
    return '<label class="user-select-item" for="puu_' + u.id + '">'
      + '<input type="checkbox" id="puu_' + u.id + '" data-uid="' + u.id + '" onchange="togglePhotoUser(this.dataset.uid,this)">'
      + av + '<span class="user-select-name">' + u.nickname + '</span></label>';
  }).join('');
}

function togglePhotoUser(id, cb) {
  if (cb.checked) selectedPhotoUserIds[id] = true;
  else delete selectedPhotoUserIds[id];
  var item = cb.closest('.user-select-item');
  if (item) item.classList.toggle('selected', cb.checked);
}

// ── 写真保存 ──────────────────────────────
function addPhoto() {
  if (!pendingPhotos.length) { alert('写真を選択してください'); return; }
  var member  = selectedMemberId ? ACTIVE_MEMBERS.find(function(m) { return m.id === selectedMemberId; }) : null;
  var caption = document.getElementById('photoCaption').value.trim();
  var targetUserIds = curPhotoShareMode === 'specific' ? Object.keys(selectedPhotoUserIds) : [];
  var btn = document.getElementById('photoSaveBtn');
  btn.disabled = true;

  var saved = 0;
  var total = pendingPhotos.length;

  function saveNext(i) {
    if (i >= total) {
      btn.disabled = false;
      document.getElementById('addModal').classList.remove('open');
      document.body.style.overflow = '';
      buildFilters(); applyFilter();
      if (saved < total) alert(total + '枚中' + saved + '枚保存しました');
      return;
    }
    btn.textContent = '保存中… ' + (i+1) + '/' + total + '枚';
    var photo = {
      memberId: member ? String(member.id) : null,
      memberName: member ? member.name : null,
      caption: caption,
      dataUrl: pendingPhotos[i].dataUrl,
      createdAt: Date.now(),
      visibility: curPhotoShareMode,
      targetUserIds: targetUserIds
    };
    PhotoAPI.add(photo).then(function(result) {
      if (result) {
        allPhotos.unshift(Object.assign({}, photo, result, { isOwn: true }));
        saved++;
      }
      saveNext(i + 1);
    }).catch(function(err) {
      console.error('写真' + (i+1) + '保存失敗:', err);
      saveNext(i + 1);
    });
  }
  saveNext(0);
}

// ━━━ ボタンバインド ━━━
function on(id, fn) {
  var el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('click', fn);
  el.addEventListener('touchend', function(e) { e.preventDefault(); fn(); }, { passive: false });
}

// ━━━ 初期データ読み込み ━━━
PhotoAPI.list().then(function(raw) {
  allPhotos = (raw || []).map(function(p) { return normalizePhoto(p); });
  buildFilters(); applyFilter();
}).catch(function() {
  getAllPhotos().then(function(local) {
    allPhotos = (local || []).map(function(p) { return Object.assign({}, p, { isOwn: true }); });
    buildFilters(); applyFilter();
  });
});
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js'));
}
</script>
