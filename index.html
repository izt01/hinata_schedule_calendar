<style>
/* ── SPLASH ── */
#splash {
  position: fixed; inset: 0;
  background: linear-gradient(165deg, #e8f6ff 0%, #c8e8f8 40%, #a8d4f0 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#splash.fade-out {
  opacity: 0;
  transform: scale(1.04);
  pointer-events: none;
}

/* Big falling petals on splash */
.splash-petals {
  position: absolute; inset: 0;
  pointer-events: none;
  overflow: hidden;
}

/* Splash content */
.splash-crest {
  font-size: 64px;
  margin-bottom: 8px;
  animation: floatCrest 3s ease-in-out infinite;
  filter: drop-shadow(0 8px 24px rgba(200,80,130,0.25));
}
@keyframes floatCrest {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-10px); }
}

.splash-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 52px;
  font-weight: 800;
  color: var(--sky);
  letter-spacing: 0.15em;
  text-align: center;
  line-height: 1.1;
  margin-bottom: 6px;
  text-shadow: 0 2px 20px rgba(139,34,82,0.15);
  animation: titleReveal 1s cubic-bezier(0.34,1.2,0.64,1) 0.3s both;
}
@keyframes titleReveal {
  from { opacity:0; transform: translateY(20px) scale(0.95); }
  to   { opacity:1; transform: translateY(0)    scale(1); }
}

.splash-subtitle {
  font-family: 'Noto Serif JP', serif;
  font-size: 12px;
  color: var(--hina-4);
  letter-spacing: 0.35em;
  margin-bottom: 4px;
  animation: titleReveal 1s cubic-bezier(0.34,1.2,0.64,1) 0.5s both;
}

.splash-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 18px 0 24px;
  animation: titleReveal 1s ease 0.65s both;
}
.splash-divider::before,
.splash-divider::after {
  content: '';
  width: 60px; height: 1px;
  background: var(--hina-3);
}
.splash-divider-mark {
  font-size: 14px;
  color: var(--hina-3);
  letter-spacing: 4px;
}

.splash-start-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 18px 48px;
  background: var(--sky);
  color: white;
  border: none;
  border-radius: 50px;
  font-family: 'Shippori Mincho', serif;
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 0.2em;
  cursor: pointer;
  box-shadow: 0 8px 32px rgba(139,34,82,0.35);
  transition: transform 0.18s, box-shadow 0.18s;
  animation: titleReveal 1s cubic-bezier(0.34,1.56,0.64,1) 0.85s both;
  position: relative;
  overflow: hidden;
}
.splash-start-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
  border-radius: inherit;
}
.splash-start-btn:active {
  transform: scale(0.95);
  box-shadow: 0 4px 16px rgba(139,34,82,0.25);
}

.splash-ver {
  position: absolute;
  bottom: 24px;
  font-family: 'Noto Serif JP', serif;
  font-size: 10px;
  color: var(--hina-3);
  letter-spacing: 0.2em;
  animation: titleReveal 1s ease 1.1s both;
}

/* ── MAIN CONTENT (hidden until splash done) ── */
#main {
  opacity: 0;
  transition: opacity 0.6s ease;
  pointer-events: none;
}
#main.visible {
  opacity: 1;
  pointer-events: auto;
}

/* ── HOME PAGE SPECIFIC ── */
.home-hero {
  margin: 24px 18px 20px;
  border-radius: 28px;
  padding: 32px 24px;
  background: linear-gradient(145deg, var(--sky) 0%, #c45070 60%, #e07898 100%);
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 36px rgba(139,34,82,0.28);
}
.home-hero::before {
  content: '✿  ✿  ✿  ✿  ✿';
  position: absolute;
  bottom: 12px; left: 0; right: 0;
  text-align: center;
  font-size: 12px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 10px;
}
.home-hero-crest { font-size: 56px; margin-bottom: 10px; }
.home-hero-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 32px;
  font-weight: 800;
  color: white;
  letter-spacing: 0.12em;
  margin-bottom: 6px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.home-hero-sub {
  color: rgba(255,255,255,0.8);
  font-family: 'Noto Serif JP', serif;
  font-size: 11px;
  letter-spacing: 0.2em;
}

/* Quick access grid */
.quick-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 13px;
  margin: 0 18px 24px;
}
.quick-card {
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(10px);
  border-radius: 22px;
  border: 1.5px solid var(--hina-2);
  padding: 22px 16px;
  text-align: center;
  text-decoration: none;
  color: var(--sumi);
  box-shadow: var(--shadow-hina);
  transition: transform 0.18s, box-shadow 0.18s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
  overflow: hidden;
}
.quick-card::before {
  content: '✿';
  position: absolute;
  bottom: -6px; right: -4px;
  font-size: 44px;
  color: var(--hina-2);
  opacity: 0.55;
  pointer-events: none;
}
.quick-card:active { transform: scale(0.96); box-shadow: none; }
.quick-card-icon { font-size: 32px; }
.quick-card-label {
  font-family: 'Shippori Mincho', serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--sky);
  letter-spacing: 0.08em;
}
.quick-card-sub {
  font-size: 10px;
  color: var(--sumi-light);
  letter-spacing: 0.06em;
}

/* Today's info strip */
.today-strip {
  margin: 0 18px 24px;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  border: 1.5px solid var(--hina-2);
  padding: 18px 20px;
  box-shadow: var(--shadow-hina);
}
.today-strip-label {
  font-family: 'Noto Serif JP', serif;
  font-size: 10px;
  color: var(--hina-4);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.today-strip-date {
  font-family: 'Shippori Mincho', serif;
  font-size: 26px;
  font-weight: 800;
  color: var(--sky);
  letter-spacing: 0.06em;
  margin-bottom: 2px;
}
.today-strip-reki {
  font-family: 'Noto Serif JP', serif;
  font-size: 11px;
  color: var(--sumi-light);
  letter-spacing: 0.12em;
}
.today-strip-clock {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 36px;
  font-weight: 800;
  color: var(--sky);
  letter-spacing: 0.05em;
  margin-top: 10px;
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.today-strip-clock-colon {
  animation: clockBlink 1s step-end infinite;
  opacity: 1;
  color: var(--hina-3);
}
@keyframes clockBlink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.2; }
}
.today-strip-clock-sec {
  font-size: 18px;
  color: var(--hina-4);
  font-weight: 700;
  margin-left: 2px;
  align-self: flex-end;
  padding-bottom: 3px;
}

/* Upcoming mini list */
.upcoming-mini {
  margin: 0 18px 100px;
}
.upcoming-mini-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--sky);
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}
.upcoming-mini-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 13px 16px;
  background: rgba(255,255,255,0.78);
  border-radius: 16px;
  border: 1.5px solid var(--hina-2);

  cursor: pointer;
  transition: transform 0.15s;
  text-decoration: none;
  color: var(--sumi);
}
.upcoming-mini-item:active { transform: scale(0.98); }
.upcoming-mini-icon { font-size: 22px; flex-shrink: 0; }
.upcoming-mini-info { flex: 1; }
.upcoming-mini-name { font-family: 'Noto Serif JP', serif; font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.upcoming-mini-date { font-size: 11px; color: var(--sumi-light); }
.upcoming-mini-badge {
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 700;
  background: var(--hina-1);
  color: var(--sky);
  border: 1px solid var(--hina-2);
  white-space: nowrap;
  font-family: 'Noto Serif JP', serif;

.upcoming-mini-badge.event-badge {
  background: rgba(90,122,90,0.1);

  border-color: rgba(90,122,90,0.3);

/* ═══════════════════════════════════════
   LOGIN SCREEN
   ═══════════════════════════════════════ */
#login-screen {
  position: fixed;
  inset: 0;
  z-index: 400;
  display: none;
  overflow: hidden;
  /* 全体タップで閉じる */
  cursor: pointer;
}
#login-screen.active {
  display: block;
}
#login-screen.closing {
  animation: loginClose 0.55s cubic-bezier(.4,0,.6,1) forwards;
}
@keyframes loginClose {
  to { opacity: 0; transform: scale(1.05); }
}

/* ── 背景グラデーション ── */
#login-bg {
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg,
    #c8e8fc 0%,
    #e4f4ff 35%,
    #fdf4d0 70%,
    #fff8e8 100%);
  animation: loginBgIn 0.4s ease both;
}
@keyframes loginBgIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* キラキラ装飾 */
.login-sparkle {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  animation: sparklePulse 2.5s ease-in-out infinite;
}
@keyframes sparklePulse {
  0%,100% { transform: scale(1);   opacity: .5; }
  50%      { transform: scale(1.3); opacity: .9; }
}

/* ── メンバー写真エリア ── */
#login-member-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  pointer-events: none;
}
#login-member-img {
  height: 88vh;
  max-width: 100vw;
  object-fit: contain;
  object-position: bottom center;
  opacity: 0;
  transform: translateY(50px);
  transition: opacity .5s ease, transform .5s cubic-bezier(.22,.9,.36,1);
  filter: drop-shadow(0 16px 48px rgba(0,80,160,.18));
}
#login-member-img.show {
  opacity: 1;
  transform: translateY(0);
}

/* ── 吹き出し（JS で top を動的セット） ── */
#login-bubble {
  position: absolute;
  /* top / right は JS で動的にセット */
  right: clamp(12px, 5vw, 40px);
  max-width: min(60vw, 240px);
  background: rgba(255,255,255,.97);
  border: 2.5px solid var(--sky, #48b4e0);
  border-radius: 24px 24px 6px 24px;
  padding: 14px 18px 13px;
  box-shadow:
    0 8px 32px rgba(72,180,224,.22),
    0 2px 8px rgba(0,0,0,.08);
  opacity: 0;
  transform: scale(.6);
  transition: opacity .4s .28s ease, transform .4s .28s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
}
#login-bubble.show {
  opacity: 1;
  transform: scale(1);
}
/* しっぽ（右下向き） */
#login-bubble::before {
  content: '';
  position: absolute;
  bottom: -17px;
  right: 26px;
  border: 9px solid transparent;
  border-top-color: var(--sky, #48b4e0);
}
#login-bubble::after {
  content: '';
  position: absolute;
  bottom: -13px;
  right: 28px;
  border: 7px solid transparent;
  border-top-color: rgba(255,255,255,.97);
}

.login-bubble-name {
  font-size: 11px;
  font-weight: 700;
  color: var(--sky, #48b4e0);
  letter-spacing: .1em;
  margin-bottom: 6px;
  font-family: 'Noto Serif JP', serif;
}
.login-bubble-text {
  font-size: 15px;
  font-weight: 700;
  line-height: 1.6;
  color: #1a2a3a;
  font-family: 'Shippori Mincho', 'Noto Serif JP', serif;
}

/* ── タイトル帯（右上） ── */
#login-title-badge {
  position: absolute;
  top: clamp(20px, 9vh, 68px);
  left: clamp(12px, 5vw, 40px);
  display: flex;
  flex-direction: column;
  gap: 2px;
  pointer-events: none;
  opacity: 0;
  animation: titleBadgeIn .5s .1s ease forwards;
}
@keyframes titleBadgeIn {
  from { opacity:0; transform:translateX(-14px); }
  to   { opacity:1; transform:translateX(0); }
}
.login-title-main {
  font-size: clamp(22px, 5.5vw, 30px);
  font-weight: 900;
  color: var(--sky, #48b4e0);
  font-family: 'Noto Serif JP', serif;
  text-shadow: 0 2px 12px rgba(72,180,224,.35);
  letter-spacing: .06em;
}
.login-title-sub {
  font-size: 11px;
  color: #4a7090;
  letter-spacing: .18em;
  font-family: 'Noto Serif JP', serif;
}

/* ── タップヒント ── */
#login-tap-hint {
  position: absolute;
  bottom: clamp(24px, 5vh, 44px);
  left: 0; right: 0;
  text-align: center;
  font-size: 11.5px;
  color: rgba(40,90,140,.5);
  letter-spacing: .2em;
  font-family: 'Noto Serif JP', serif;
  animation: tapHintPulse 2s ease-in-out infinite;
  pointer-events: none;
}
@keyframes tapHintPulse {
  0%,100% { opacity: .4; }
  50%      { opacity: .9; }
}

</style>

<script>
// ── SPLASH ──────────────────────────
// Splash canvas big petals
(function() {
  const c = document.getElementById('splashCanvas');
  c.width  = window.innerWidth;
  c.height = window.innerHeight;
  const ctx = c.getContext('2d');
  const COLORS = ['#f5b800','#72bce8','#fde87a','#b3dcf5','#ffffff'];
  const items = Array.from({length:18}, () => ({
    x: Math.random()*c.width, y: Math.random()*c.height,
    r: 10+Math.random()*14, rot: Math.random()*Math.PI*2,
    rs: (Math.random()-.5)*.02, sp: .5+Math.random()*.8,
    dr: (Math.random()-.5)*.4, wb: Math.random()*Math.PI*2, wbs:.01+Math.random()*.015,
    col: COLORS[~~(Math.random()*COLORS.length)], op: .25+Math.random()*.4,
  }));
  function draw(p) {
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.globalAlpha=p.op; ctx.fillStyle=p.col; ctx.beginPath();
    for(let i=0;i<5;i++){
      const a=(i/5)*Math.PI*2-Math.PI/2;
      const px=Math.cos(a)*p.r,py=Math.sin(a)*p.r;
      const cx1=Math.cos(a-.5)*p.r*.6,cy1=Math.sin(a-.5)*p.r*.6;
      const cx2=Math.cos(a+.5)*p.r*.6,cy2=Math.sin(a+.5)*p.r*.6;
      if(i===0)ctx.moveTo(0,0);
      ctx.quadraticCurveTo(cx1,cy1,px,py);ctx.quadraticCurveTo(cx2,cy2,0,0);
    }
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
  let raf;
  function tick(){
    ctx.clearRect(0,0,c.width,c.height);
    items.forEach(p=>{
      p.wb+=p.wbs; p.x+=p.dr+Math.sin(p.wb)*.5; p.y+=p.sp; p.rot+=p.rs;
      if(p.y>c.height+20){p.y=-20;p.x=Math.random()*c.width;}
      draw(p);
    });
    raf=requestAnimationFrame(tick);
  }
  tick();
  window._stopSplashPetals = ()=>cancelAnimationFrame(raf);
})();

  if (candidates.length) {
    // login_memberフォルダに画像があるメンバーを優先
    // → 実際には読み込んでみてエラーなら非表示にする
    const m = candidates[Math.floor(Math.random() * candidates.length)];
    memberName = m.name;
    const base = m.avatar ? m.avatar.split('/').pop() : '';
    if (base) imgSrc = 'login_member/' + base;
  }
  nameEl.textContent = memberName;

  // 画面表示
  screen.classList.add('active');

  // 画像読み込み
  if (imgSrc) {
    imgEl.onload = () => {
      imgEl.classList.add('show');
      positionBubble();
      bubble.classList.add('show');
    };
    imgEl.onerror = () => {
      // 画像なし → 吹き出しをデフォルト位置で表示
      bubble.style.top = clampPx(window.innerHeight * 0.12, 20, 80);
      bubble.classList.add('show');
    };
    imgEl.src = imgSrc;
  } else {
    bubble.style.top = clampPx(window.innerHeight * 0.12, 20, 80);
    bubble.classList.add('show');
  }

  // リサイズ時も追従
  window._loginResizeHandler = () => positionBubble();
  window.addEventListener('resize', window._loginResizeHandler);

  function clampPx(val, min, max) {
    return Math.max(min, Math.min(max, val)) + 'px';
  }

  function positionBubble() {
    // 写真の実際の表示領域を取得
    const imgRect = imgEl.getBoundingClientRect();
    const screenH = window.innerHeight;
    const screenW = window.innerWidth;

    // 写真の「上端」を基準に吹き出しを配置
    // 写真上端が画面上部から何px？
    const imgTop = imgRect.top;

    // 吹き出し上端 = 写真上端の少し上（写真が見切れているときは画面上部から一定量）
    const bubbleTop = Math.max(16, imgTop - 8);

    // スマホ（縦長）では吹き出しを写真の右上、PCでは右上固定
    const isNarrow = screenW < 600;
    if (isNarrow) {
      // スマホ: 写真の上端より少し上に
      bubble.style.top  = Math.max(16, imgTop - 4) + 'px';
      bubble.style.right = '12px';
      bubble.style.maxWidth = Math.min(screenW * 0.58, 220) + 'px';
    } else {
      // PC: 写真上端に合わせつつ、最低でも上から16px
      bubble.style.top  = Math.max(16, imgTop + 8) + 'px';
      bubble.style.right = clampPx(screenW * 0.04, 16, 48);
      bubble.style.maxWidth = Math.min(screenW * 0.35, 280) + 'px';
    }
  }

  // タップで次へ
  function proceed() {
    screen.removeEventListener('click', proceed);
    if (window._loginResizeHandler) {
      window.removeEventListener('resize', window._loginResizeHandler);
      window._loginResizeHandler = null;
    }
    screen.classList.add('closing');
    setTimeout(() => {
      screen.classList.remove('active', 'closing');
      onDone();
    }, 550);
  }
  // 少し待ってからタップ受付（誤タップ防止）
  setTimeout(() => screen.addEventListener('click', proceed), 400);
}

function startApp() {
  if(window._stopSplashPetals) window._stopSplashPetals();
  const splash = document.getElementById('splash');
  const main   = document.getElementById('main');
  splash.classList.add('fade-out');
  setTimeout(() => {
    splash.style.display = 'none';
    // ログイン演出 → メイン表示
    showLoginScreen(() => {
      main.classList.add('visible');
    });
  }, 750);
}

// ── TODAY ──────────────────────────
(function() {
  const now = new Date();
  const DOW = ['日','月','火','水','木','金','土'];
  const dateStr = `${now.getFullYear()}年 ${now.getMonth()+1}月${now.getDate()}日（${DOW[now.getDay()]}）`;
  document.getElementById('todayDate').textContent = dateStr;
  document.getElementById('todayReki').textContent = `${MONTHS_JP[now.getMonth()]} 🌻 ${MONTHS_EN[now.getMonth()]}`;
})();

// ── LIVE CLOCK ──────────────────────
(function() {
  function pad(n) { return String(n).padStart(2,'0'); }
  function tick() {
    const t = new Date();
    document.getElementById('clockH').textContent = pad(t.getHours());
    document.getElementById('clockM').textContent = pad(t.getMinutes());
    document.getElementById('clockS').textContent = pad(t.getSeconds());
  }
  tick();
  setInterval(tick, 1000);
})();

// ── UPCOMING ──────────────────────
(function() {
  const today = new Date(); today.setHours(0,0,0,0);
  const items = [];

  ACTIVE_MEMBERS.forEach(m => {
    const diff = daysUntilBirthday(m.birthday);
    if (diff <= 30) {
      const [mm,dd] = m.birthday.split('-').map(Number);
      items.push({ icon:m.avatar, name:`${m.name}の誕生日`, dateStr:`${mm}月${dd}日`, diff, href:`member-detail.html?id=${m.id}`, type:'bday' });
    }
  });

  loadEvents().forEach(e => {
    const d = new Date(e.date+'T00:00:00');
    const diff = Math.round((d - today)/86400000);
    if (diff >= 0 && diff <= 30) {
      items.push({ icon:e.emoji, name:e.name, dateStr:`${d.getMonth()+1}月${d.getDate()}日`, diff, href:'events.html', type:'event' });
    }
  });

  items.sort((a,b)=>a.diff-b.diff);
  const el = document.getElementById('upcomingMini');

  if (!items.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">✿</div><div class="empty-state-text">近日の行事はありません</div></div>`;
    return;
  }

  el.innerHTML = items.slice(0,5).map(u => {
    const diffStr = u.diff===0?'今日':u.diff===1?'明日':`あと${u.diff}日`;
    const isImg = u.icon && /\.(png|jpg|jpeg|gif|webp|svg)$/i.test(u.icon);
    const iconHTML = isImg
      ? `<img src="${u.icon}" alt="" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:1.5px solid var(--hina-2);">`
      : `<span style="font-size:22px">${u.icon}</span>`;
    return `<a class="upcoming-mini-item" href="${u.href}">
      <div class="upcoming-mini-icon">${iconHTML}</div>
      <div class="upcoming-mini-info">
        <div class="upcoming-mini-name">${u.name}</div>
        <div class="upcoming-mini-date">${u.dateStr}</div>
      </div>
      <span class="upcoming-mini-badge ${u.type==='event'?'event-badge':''}">${diffStr}</span>
    </a>`;
  }).join('');
})();
</script>
