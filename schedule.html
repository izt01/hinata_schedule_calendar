<style>
.schedule-hero {
  margin:0 0 24px; padding:32px 20px 24px;
  background:linear-gradient(145deg,#3a7a50 0%,#2a6040 50%,#1a4830 100%);
  border-radius:0 0 32px 32px; text-align:center;
  box-shadow:0 8px 32px rgba(40,100,60,0.3);
}
.schedule-hero-icon  { font-size:52px; margin-bottom:10px; }
.schedule-hero-title { font-family:'Shippori Mincho',serif; font-size:26px; font-weight:800; color:white; letter-spacing:0.1em; margin-bottom:4px; }
.schedule-hero-sub   { font-family:'Noto Serif JP',serif; font-size:11px; color:rgba(255,255,255,0.8); letter-spacing:0.15em; }

.schedule-list { display:flex; flex-direction:column; gap:16px; margin-bottom:100px; }
.schedule-card { background:rgba(255,255,255,0.88); backdrop-filter:blur(10px); border-radius:22px; border:1.5px solid var(--hina-2); overflow:hidden; box-shadow:var(--shadow-hina); }
.schedule-card.completed { border-color:rgba(40,160,80,0.3); background:rgba(240,255,245,0.9); }
.schedule-card-header { padding:16px 18px 12px; border-bottom:1px solid var(--hina-1); display:flex; align-items:flex-start; gap:12px; }
.schedule-card-title { font-family:'Shippori Mincho',serif; font-size:16px; font-weight:800; color:var(--sumi); flex:1; line-height:1.4; }
.schedule-card-desc  { font-family:'Noto Serif JP',serif; font-size:11px; color:var(--sumi-light); margin-top:4px; line-height:1.6; }
.schedule-status-badge { flex-shrink:0; padding:4px 10px; border-radius:12px; font-size:10px; font-weight:700; font-family:'Noto Serif JP',serif; white-space:nowrap; }
.badge-inprogress { background:rgba(21,101,160,0.1); color:var(--sky); border:1px solid var(--hina-2); }
.badge-completed  { background:rgba(40,160,80,0.12); color:#2a7a40; border:1px solid rgba(40,160,80,0.3); }

.step-list { padding:12px 18px 14px; display:flex; flex-direction:column; gap:0; }
.step-item { display:flex; align-items:flex-start; gap:12px; padding:10px 0; position:relative; }
.step-item:not(:last-child)::after { content:''; position:absolute; left:16px; top:36px; width:2px; bottom:-10px; background:var(--hina-2); }
.step-item.step-completed::after { background:rgba(40,160,80,0.3); }
.step-icon { width:34px; height:34px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:15px; border:2px solid var(--hina-2); background:white; position:relative; z-index:1; }
.icon-waiting    { background:var(--hina-0); border-color:var(--hina-2); color:var(--sumi-light); }
.icon-inprogress { background:rgba(21,101,160,0.12); border-color:var(--sky); color:var(--sky); }
.icon-completed  { background:rgba(40,160,80,0.12); border-color:#2a8a40; color:#2a8a40; }
.step-body { flex:1; min-width:0; }
.step-order-num { font-size:9px; font-family:'Noto Serif JP',serif; color:var(--sumi-light); margin-bottom:2px; letter-spacing:0.1em; }
.step-title { font-family:'Noto Serif JP',serif; font-size:13px; font-weight:600; color:var(--sumi); margin-bottom:4px; }
.step-title.title-completed { text-decoration:line-through; color:var(--sumi-light); }
.step-assignee { display:inline-flex; align-items:center; gap:5px; padding:3px 8px; border-radius:10px; background:var(--hina-1); border:1px solid var(--hina-2); font-size:10px; font-family:'Noto Serif JP',serif; color:var(--sumi-light); }
.step-assignee.is-me { background:rgba(21,101,160,0.1); border-color:var(--sky); color:var(--sky); font-weight:700; }
.step-assignee img { width:16px; height:16px; border-radius:50%; object-fit:cover; }
.step-assignee-noone { font-size:10px; color:var(--sumi-light); font-family:'Noto Serif JP',serif; font-style:italic; }
.step-completed-at { font-size:9px; color:var(--sumi-light); font-family:'Noto Serif JP',serif; margin-top:3px; }
.step-complete-btn { flex-shrink:0; padding:7px 12px; border-radius:14px; background:var(--sky); border:none; color:white; font-family:'M PLUS Rounded 1c',sans-serif; font-size:11px; font-weight:700; cursor:pointer; touch-action:manipulation; white-space:nowrap; align-self:center; }
.step-complete-btn:active { opacity:0.85; }
.schedule-progress-bar { margin:0 18px 14px; height:6px; border-radius:3px; background:var(--hina-1); overflow:hidden; }
.schedule-progress-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,#3a7a50,#5ab070); transition:width 0.4s; }
.schedule-card-footer { padding:0 18px 14px; display:flex; align-items:center; justify-content:space-between; }
.schedule-delete-btn { background:none; border:none; font-size:11px; color:rgba(200,60,60,0.6); cursor:pointer; touch-action:manipulation; font-family:'Noto Serif JP',serif; padding:4px 0; }
.due-badge { display:inline-flex; align-items:center; gap:3px; padding:3px 9px; border-radius:10px; font-size:10px; font-weight:700; font-family:'Noto Serif JP',serif; background:rgba(21,101,160,0.08); color:var(--sky); border:1px solid var(--hina-2); }
.due-badge.soon { background:rgba(200,140,0,0.10); color:#a06000; border-color:rgba(200,140,0,0.3); }
.due-badge.overdue { background:rgba(200,50,50,0.10); color:#c03030; border-color:rgba(200,50,50,0.3); }

/* 繝｢繝ｼ繝繝ｫ */
.ev-modal-wrap { display:none; position:fixed; inset:0; z-index:300; align-items:flex-end; justify-content:center; }
.ev-modal-wrap.open { display:flex; }
.ev-modal-bg { position:absolute; inset:0; background:rgba(10,30,60,0.5); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); }

.step-input-list { display:flex; flex-direction:column; gap:10px; margin-bottom:12px; }

.step-input-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.step-input-num { width:24px; height:24px; border-radius:50%; background:var(--sky); color:white; font-size:11px; font-weight:800; font-family:'M PLUS Rounded 1c',sans-serif; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.step-input-label { font-family:'Noto Serif JP',serif; font-size:12px; font-weight:700; color:var(--sumi); flex:1; }
.step-remove-btn { width:24px; height:24px; border-radius:50%; background:none; border:1.5px solid var(--hina-3); color:var(--sumi-light); font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; touch-action:manipulation; flex-shrink:0; }
.step-assignee-select { width:100%; background:rgba(255,255,255,0.9); border:1.5px solid var(--hina-2); border-radius:12px; padding:9px 32px 9px 12px; font-family:'Noto Sans JP',sans-serif; font-size:13px; color:var(--sumi); outline:none; appearance:none; -webkit-appearance:none; }
.add-step-btn { width:100%; padding:12px; border-radius:16px; border:2px dashed var(--hina-3); background:var(--hina-0); font-family:'Noto Serif JP',serif; font-size:12px; font-weight:600; color:var(--sumi-light); cursor:pointer; text-align:center; touch-action:manipulation; }
</style>

<script>
// 笏笏 蛻晄悄蛹・笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏
document.getElementById('headerMount').outerHTML = headerHTML('繧ｹ繧ｱ繧ｸ繝･繝ｼ繝ｫ騾ｲ謐・, '搭 繧ｿ繧ｹ繧ｯ邂｡逅・搭');
injectNav('schedule.html');

var allUsers     = [];
var allSchedules = [];
var stepCount    = 0;

// 笏笏 譛滄剞繝輔か繝ｼ繝槭ャ繝・笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏
function formatDueDate(dateStr) {
  if (!dateStr) return null;
  // ISO蠖｢蠑擾ｼ・026-06-09T00:00:00.000Z・峨→譌･莉伜ｽ｢蠑擾ｼ・026-06-09・我ｸ｡蟇ｾ蠢・  var dateOnly = dateStr.split('T')[0];
  var due   = new Date(dateOnly + 'T00:00:00');
  var today = new Date(); today.setHours(0,0,0,0);
  var diff  = Math.round((due - today) / 86400000);
  if (isNaN(diff)) return null;
  var label = diff < 0  ? ('譛滄剞蛻・ｌ ' + Math.abs(diff) + '譌･雜・℃')
            : diff === 0 ? '套 莉頑律縺梧悄髯・
            : diff === 1 ? '套 譏取律縺梧悄髯・
            : ('套 縺ゅ→' + diff + '譌･');
  return { label: label, isOverdue: diff < 0, isSoon: diff >= 0 && diff <= 3 };
}

// 笏笏 荳隕ｧ謠冗判 笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏
function renderSchedules() {
  var el = document.getElementById('scheduleList');
  if (!allSchedules.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">搭</div><div class="empty-state-text">繧ｹ繧ｱ繧ｸ繝･繝ｼ繝ｫ縺後∪縺縺ゅｊ縺ｾ縺帙ｓ<br>・九・繧ｿ繝ｳ縺九ｉ菴懈・縺励∪縺励ｇ縺・/div></div>';
    return;
  }
  el.innerHTML = allSchedules.map(renderScheduleCard).join('');
  el.querySelectorAll('.step-complete-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { completeStep(this.dataset.sched, this.dataset.step); });
    btn.addEventListener('touchend', function(e) { e.preventDefault(); completeStep(this.dataset.sched, this.dataset.step); }, { passive: false });
  });
  el.querySelectorAll('.schedule-delete-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { deleteSchedule(this.dataset.del); });
    btn.addEventListener('touchend', function(e) { e.preventDefault(); deleteSchedule(this.dataset.del); }, { passive: false });
  });
}

function renderScheduleCard(s) {
  var myId      = getUser() ? getUser().id : null;
  var total     = s.steps ? s.steps.length : 0;
  var completed = s.steps ? s.steps.filter(function(st) { return st.status === 'completed'; }).length : 0;
  var pct       = total ? Math.round(completed / total * 100) : 0;
  var isDone    = s.status === 'completed';
  var isCreator = s.created_by === myId;

  var stepsHtml = (s.steps || []).map(function(st) {
    var isMe    = st.assignee_id === myId;
    var iconMap = { waiting:'竢ｸ', in_progress:'笆ｶ', completed:'笨・ };
    var icon    = iconMap[st.status] || '竢ｸ';
    var iconCls = 'icon-' + st.status.replace('_','');

    var assigneeHtml = st.assignee_id
      ? '<span class="step-assignee' + (isMe ? ' is-me' : '') + '">'
          + (st.assignee_avatar ? '<img src="' + st.assignee_avatar + '">' : '側')
          + ' ' + (st.assignee_nickname || '') + (isMe ? '・医≠縺ｪ縺滂ｼ・ : '')
          + '</span>'
      : '<span class="step-assignee-noone">諡・ｽ楢・悴險ｭ螳・/span>';

    var canComplete = st.status === 'in_progress' && (isMe || !st.assignee_id);
    var completeBtn = canComplete
      ? '<button class="step-complete-btn" data-sched="' + s.id + '" data-step="' + st.id + '" style="touch-action:manipulation">繧ｿ繧ｹ繧ｯ螳御ｺ・/button>'
      : '';

    var completedAt = st.completed_at
      ? '<div class="step-completed-at">笨・' + new Date(st.completed_at).toLocaleDateString('ja-JP') + ' 螳御ｺ・/div>'
      : '';

    var stepDue = (st.due_date && st.status !== 'completed') ? formatDueDate(st.due_date) : null;
    var stepDueBadge = stepDue
      ? '<span class="due-badge' + (stepDue.isOverdue ? ' overdue' : stepDue.isSoon ? ' soon' : '') + '" style="font-size:9px;padding:2px 7px;margin-top:4px;display:inline-block">' + stepDue.label + '</span>'
      : '';

    return '<div class="step-item' + (st.status === 'completed' ? ' step-completed' : '') + '">'
      + '<div class="step-icon ' + iconCls + '">' + icon + '</div>'
      + '<div class="step-body">'
        + '<div class="step-order-num">STEP ' + st.step_order + '</div>'
        + '<div class="step-title' + (st.status === 'completed' ? ' title-completed' : '') + '">' + st.title + '</div>'
        + '<div style="margin-top:5px">' + assigneeHtml + '</div>'
        + stepDueBadge
        + completedAt
      + '</div>'
      + completeBtn
      + '</div>';
  }).join('');

  var d       = new Date(s.created_at);
  var dateStr = (d.getMonth()+1) + '/' + d.getDate();
  var overallDue = s.due_date ? formatDueDate(s.due_date) : null;
  var dueBadge   = overallDue
    ? '<span class="due-badge' + (overallDue.isOverdue ? ' overdue' : overallDue.isSoon ? ' soon' : '') + '">' + overallDue.label + '</span>'
    : '';

  return '<div class="schedule-card' + (isDone ? ' completed' : '') + '" id="sched_' + s.id + '">'
    + '<div class="schedule-card-header">'
      + '<div style="flex:1">'
        + '<div class="schedule-card-title">' + s.title + '</div>'
        + (s.description ? '<div class="schedule-card-desc">' + s.description + '</div>' : '')
        + '<div style="margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
          + '<span style="font-size:10px;color:var(--sumi-light);font-family:\'Noto Serif JP\',serif">'
            + (s.creator_nickname ? '笨ｿ ' + s.creator_nickname : '') + ' ﾂｷ ' + dateStr
          + '</span>'
          + dueBadge
        + '</div>'
      + '</div>'
      + '<span class="schedule-status-badge ' + (isDone ? 'badge-completed' : 'badge-inprogress') + '">'
        + (isDone ? '笨・螳御ｺ・ : ('売 ' + completed + '/' + total + '螳御ｺ・))
      + '</span>'
    + '</div>'
    + '<div class="schedule-progress-bar"><div class="schedule-progress-fill" style="width:' + pct + '%"></div></div>'
    + '<div class="step-list">' + stepsHtml + '</div>'
    + (isCreator
        ? '<div class="schedule-card-footer">'
            + '<div style="font-size:10px;color:var(--sumi-light);font-family:\'Noto Serif JP\',serif">騾ｲ謐・' + pct + '%</div>'
            + '<button class="schedule-delete-btn" data-del="' + s.id + '" style="touch-action:manipulation">卵 蜑企勁</button>'
          + '</div>'
        : '<div style="height:8px"></div>')
    + '</div>';
}

// 笏笏 繝・・繧ｿ蜿門ｾ・笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏
function loadSchedules() {
  apiFetch('/api/schedules').then(function(data) {
    allSchedules = data || [];
    renderSchedules();
  }).catch(function() {
    allSchedules = [];
    renderSchedules();
  });
}

// 笏笏 繧ｹ繝・ャ繝怜ｮ御ｺ・笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏
function completeStep(schedId, stepId) {
  if (!confirm('縺薙・繧ｹ繝・ャ繝励ｒ螳御ｺ・↓縺励∪縺吶°・歃n谺｡縺ｮ諡・ｽ楢・↓繝舌ヨ繝ｳ縺梧ｸ｡縺輔ｌ縺ｾ縺吶・)) return;
  apiFetch('/api/schedules/' + schedId + '/steps/' + stepId + '/complete', { method: 'PUT' })
    .then(function(result) {
      if (!result) return;
      var idx = allSchedules.findIndex(function(s) { return s.id === schedId; });
      if (idx !== -1) {
        allSchedules[idx].steps    = result.steps;
        allSchedules[idx].status   = result.schedule.status;
      }
      renderSchedules();
      // 繧ｿ繧ｹ繧ｯ繝舌ャ繧ｸ繧貞叉譎よ峩譁ｰ
      if (typeof checkMyPendingTasks === 'function') checkMyPendingTasks();
    })
    .catch(function(err) { alert('繧ｨ繝ｩ繝ｼ: ' + err.message); });
}

function deleteSchedule(id) {
  if (!confirm('縺薙・繧ｹ繧ｱ繧ｸ繝･繝ｼ繝ｫ繧貞炎髯､縺励∪縺吶°・歃n蜈ｨ縺ｦ縺ｮ繧ｹ繝・ャ繝励ｂ蜑企勁縺輔ｌ縺ｾ縺吶・)) return;
  apiFetch('/api/schedules/' + id, { method: 'DELETE' })
    .then(function() {
      allSchedules = allSchedules.filter(function(s) { return s.id !== id; });
      renderSchedules();
    })
    .catch(function(err) { alert('蜑企勁繧ｨ繝ｩ繝ｼ: ' + err.message); });
}

// 笏笏 繝｢繝ｼ繝繝ｫ 笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏笏
function openCreateModal() {
  if (!isLoggedIn()) {
    alert('繧｢繧ｫ繧ｦ繝ｳ繝郁ｨｭ螳壹′蠢・ｦ√〒縺・);
    window.location.href = 'profile.html';
    return;
  }
  document.getElementById('schedTitle').value   = '';
  document.getElementById('schedDesc').value    = '';
  document.getElementById('schedDueDate').value = '';
  stepCount = 0;
  document.getElementById('stepInputList').innerHTML = '';
  document.getElementById('createModal').classList.add('open');
  document.body.style.overflow = 'hidden';
  UserAPI.list()
    .then(function(users) { allUsers = users || []; })
    .catch(function() { allUsers = []; })
    .finally(function() { addStepInput(); addStepInput(); });
}

function closeCreateModal() {
  document.getElementById('createModal').classList.remove('open');
  document.body.style.overflow = '';
}

function addStepInput() {
  stepCount++;
  var num = stepCount;
  var myId = getUser() ? getUser().id : null;
  var opts = allUsers.length
    ? allUsers.map(function(u) {
        var isMe = u.id === myId;
        return '<option value="' + u.id + '">' + (isMe ? '側 ' : '') + u.nickname + (isMe ? '・医≠縺ｪ縺滂ｼ・ : '') + '</option>';
      }).join('')
    : '<option value="" disabled>繝ｦ繝ｼ繧ｶ繝ｼ縺瑚ｦ九▽縺九ｊ縺ｾ縺帙ｓ</option>';

  var div = document.createElement('div');
  div.className  = 'step-input-row';
  div.dataset.step = num;
  div.innerHTML  =
    '<div class="step-input-header">'
      + '<div class="step-input-num">' + num + '</div>'
      + '<div class="step-input-label">STEP ' + num + '</div>'
      + (num > 1 ? '<button type="button" class="step-remove-btn" onclick="removeStepInput(this)">笨・/button>' : '')
    + '</div>'
    + '<input class="form-input" type="text" placeholder="萓具ｼ壹ョ繧ｶ繧､繝ｳ譯医ｒ菴懈・縺吶ｋ" autocomplete="off" style="margin-bottom:8px" data-step-title="' + num + '">'
    + '<div style="display:flex;gap:8px">'
      + '<div style="flex:1">'
        + '<div style="font-size:9px;color:var(--sumi-light);font-family:\'Noto Serif JP\',serif;margin-bottom:4px">側 諡・ｽ楢・ｼ井ｻｻ諢擾ｼ・/div>'
        + '<select class="step-assignee-select" data-step-assignee="' + num + '">'
          + '<option value="">笏笏 諡・ｽ楢・↑縺・笏笏</option>'
          + opts
        + '</select>'
      + '</div>'
      + '<div style="flex:1">'
        + '<div style="font-size:9px;color:var(--sumi-light);font-family:\'Noto Serif JP\',serif;margin-bottom:4px">套 繧ｹ繝・ャ繝玲悄髯撰ｼ井ｻｻ諢擾ｼ・/div>'
        + '<input type="date" class="form-input" data-step-due="' + num + '" style="font-size:12px;padding:9px 10px;width:100%">'
      + '</div>'
    + '</div>';
  document.getElementById('stepInputList').appendChild(div);
}

function removeStepInput(btn) {
  btn.closest('.step-input-row').remove();
  document.querySelectorAll('.step-input-row').forEach(function(r, i) {
    r.querySelector('.step-input-num').textContent   = i + 1;
    r.querySelector('.step-input-label').textContent = 'STEP ' + (i + 1);
  });
  stepCount = document.querySelectorAll('.step-input-row').length;
}

function createSchedule() {
  var title   = document.getElementById('schedTitle').value.trim();
  var desc    = document.getElementById('schedDesc').value.trim();
  var dueDate = document.getElementById('schedDueDate').value || null;
  if (!title) { alert('繧ｿ繧､繝医Ν繧貞・蜉帙＠縺ｦ縺上□縺輔＞'); return; }

  var steps = [];
  document.querySelectorAll('.step-input-row').forEach(function(row) {
    var t = row.querySelector('[data-step-title]').value.trim();
    var a = row.querySelector('select').value;
    var d = row.querySelector('[data-step-due]') ? row.querySelector('[data-step-due]').value : '';
    if (!t) { alert('蜈ｨ縺ｦ縺ｮ繧ｹ繝・ャ繝励↓繧ｿ繧､繝医Ν繧貞・蜉帙＠縺ｦ縺上□縺輔＞'); return; }
    steps.push({ title: t, assignee_id: a || null, due_date: d || null });
  });
  if (!steps.length) { alert('繧ｹ繝・ャ繝励ｒ1縺､莉･荳願ｿｽ蜉縺励※縺上□縺輔＞'); return; }

  var btn = document.getElementById('schedSaveBtn');
  btn.disabled = true; btn.textContent = '菴懈・荳ｭ窶ｦ';
  apiFetch('/api/schedules', {
    method: 'POST',
    body: JSON.stringify({ title: title, description: desc, due_date: dueDate, steps: steps }),
  }).then(function(result) {
    if (result) {
      allSchedules.unshift(result);
      closeCreateModal();
      renderSchedules();
    }
  }).catch(function(err) {
    alert('菴懈・繧ｨ繝ｩ繝ｼ: ' + err.message);
  }).finally(function() {
    btn.disabled = false; btn.textContent = '菴・謌・;
  });
}

// 笏≫煤笏・繝懊ち繝ｳ繝舌う繝ｳ繝・笏≫煤笏・function on(id, fn) {
  var el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('click', fn);
  el.addEventListener('touchend', function(e) { e.preventDefault(); fn(); }, { passive: false });
}
on('createBtn',        openCreateModal);
on('createModalBg',    closeCreateModal);
on('createModalClose', closeCreateModal);
on('addStepBtn',       addStepInput);
on('schedSaveBtn',     createSchedule);

  document.getElementById('scheduleList').innerHTML =

  document.getElementById('createBtn').style.display = 'none';

}
