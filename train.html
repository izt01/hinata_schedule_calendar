<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>電車検索 — ひなたカレンダー</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565a0">
<link rel="stylesheet" href="style.css">
<style>
.train-hero {
  margin: 24px 18px 20px;
  border-radius: 28px;
  padding: 28px 24px 22px;
  background: linear-gradient(145deg, #1565a0 0%, #0d4678 60%, #1a3a6a 100%);
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 36px rgba(21,101,160,0.35);
}
.train-hero::before {
  content: '🌟  🌟  🌟  🌟  🌟';
  position: absolute;
  bottom: 10px; left: 0; right: 0;
  text-align: center; font-size: 12px;
  color: rgba(255,255,255,0.1); letter-spacing: 10px;
}
.train-hero-icon { font-size: 48px; margin-bottom: 8px; }
.train-hero-title {
  font-family: 'Shippori Mincho', serif;
  font-size: 26px; font-weight: 800;
  color: white; letter-spacing: 0.12em; margin-bottom: 4px;
}
.train-hero-sub {
  color: rgba(255,255,255,0.7);
  font-family: 'Noto Serif JP', serif;
  font-size: 11px; letter-spacing: 0.2em;
}
.train-form-card {
  margin: 0 18px 20px;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(12px);
  border-radius: 24px;
  border: 1.5px solid var(--hina-2);
  padding: 22px 20px;
  box-shadow: var(--shadow-hina);
}
.train-input-row {
  display: flex; align-items: center;
  gap: 10px; margin-bottom: 12px;
}
.train-input-icon {
  width: 36px; height: 36px;
  background: var(--hina-1); border: 1.5px solid var(--hina-2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.train-input-wrap { flex: 1; position: relative; }
.train-input-label {
  font-family: 'Noto Serif JP', serif;
  font-size: 10px; color: var(--hina-4);
  letter-spacing: 0.2em; margin-bottom: 4px;
}
.train-input {
  width: 100%;
  background: rgba(255,255,255,0.95);
  border: 1.5px solid var(--hina-2);
  border-radius: 13px;
  padding: 11px 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px; color: var(--sumi);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.train-input:focus {
  border-color: var(--hina-3);
  box-shadow: 0 0 0 3px rgba(114,188,232,0.18);
}
.train-input::placeholder { color: var(--sumi-light); opacity: 0.6; font-size: 13px; }
.suggest-list {
  display: none; position: absolute;
  top: calc(100% + 4px); left: 0; right: 0;
  background: white;
  border: 1.5px solid var(--hina-2);
  border-radius: 13px; overflow: hidden;
  box-shadow: 0 8px 24px rgba(21,101,160,0.15);
  z-index: 50; max-height: 200px; overflow-y: auto;
}
.suggest-list.open { display: block; }
.suggest-item {
  padding: 11px 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px; color: var(--sumi); cursor: pointer;
  border-bottom: 1px solid var(--hina-1);
  display: flex; align-items: center; gap: 8px;
}
.suggest-item:last-child { border-bottom: none; }
.suggest-item:hover, .suggest-item:active { background: var(--hina-1); }
.train-swap-btn {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; margin: 0 auto 12px;
  background: var(--hina-1); border: 1.5px solid var(--hina-2);
  border-radius: 50%; cursor: pointer; font-size: 18px;
  transition: transform 0.3s, background 0.2s; user-select: none;
}
.train-swap-btn:active { transform: rotate(180deg); background: var(--hina-2); }
.train-datetime-row { display: flex; gap: 10px; margin-bottom: 16px; }
.train-datetime-row .train-input-wrap { flex: 1; }
.train-search-btn {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, #1565a0 0%, #0d4678 100%);
  color: white; border: none; border-radius: 16px;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 16px; font-weight: 800; letter-spacing: 0.1em;
  cursor: pointer;
  box-shadow: 0 6px 22px rgba(21,101,160,0.32);
  transition: transform 0.15s, box-shadow 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.train-search-btn:active { transform: scale(0.97); box-shadow: none; }
.train-search-btn:disabled { opacity: 0.55; cursor: not-allowed; }
/* loading */
.train-loading { text-align: center; padding: 40px 20px; display: none; }
.train-loading.visible { display: block; }
.loading-train { font-size: 40px; display: inline-block; animation: trainAnim 0.7s ease-in-out infinite alternate; }
@keyframes trainAnim { 0%{transform:translateX(-16px)} 100%{transform:translateX(16px)} }
.loading-text { font-family:'Noto Serif JP',serif; font-size:13px; color:var(--hina-4); margin-top:12px; letter-spacing:0.1em; }
/* error */
.train-error { margin:0 18px 16px; background:rgba(255,80,80,0.07); border:1.5px solid rgba(255,80,80,0.22); border-radius:16px; padding:14px 16px; text-align:center; display:none; }
.train-error.visible { display:block; }
.train-error-text { font-family:'Noto Serif JP',serif; font-size:13px; color:#c0392b; line-height:1.8; white-space:pre-line; }
/* results */
.train-results { margin:0 18px 100px; display:none; }
.results-header { font-family:'Noto Serif JP',serif; font-size:12px; color:var(--sumi-light); margin-bottom:16px; line-height:1.7; }
.results-route-label { font-family:'Shippori Mincho',serif; font-size:18px; font-weight:800; color:var(--sky); margin-bottom:2px; }
/* route card */
.route-card { background:rgba(255,255,255,0.9); backdrop-filter:blur(12px); border-radius:22px; border:1.5px solid var(--hina-2); margin-bottom:16px; overflow:hidden; box-shadow:var(--shadow-hina); }
.route-card-header { padding:14px 18px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--hina-1); }
.route-badge { display:inline-flex; align-items:center; gap:5px; padding:5px 13px; border-radius:20px; font-family:'M PLUS Rounded 1c',sans-serif; font-size:12px; font-weight:800; color:white; }
.route-badge.best  { background:linear-gradient(135deg,#e0872a,#f5b800); }
.route-badge.few   { background:linear-gradient(135deg,#2ea06a,#34c47a); }
.route-badge.other { background:linear-gradient(135deg,#7b5ea7,#a07bcf); }
.route-meta { text-align:right; }
.route-total-time { font-family:'M PLUS Rounded 1c',sans-serif; font-size:24px; font-weight:800; color:var(--sky); line-height:1; }
.route-total-time small { font-size:13px; color:var(--sumi-light); font-weight:400; }
.route-fare-text { font-family:'Noto Serif JP',serif; font-size:12px; color:var(--sumi-light); margin-top:2px; }
.xfer-count-text { font-size:11px; color:var(--sumi-light); margin-top:4px; }
/* timeline */
.route-body { padding:16px 18px; }
.tl-item { display:flex; gap:12px; }
.tl-left { display:flex; flex-direction:column; align-items:center; width:30px; flex-shrink:0; }
.tl-dot { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; border:2px solid var(--hina-2); background:white; }
.tl-dot.dep { background:#1565a0; border-color:#1565a0; }
.tl-dot.arr { background:#c0392b; border-color:#c0392b; }
.tl-dot.xfer { background:var(--hina-1); }
.tl-vline { width:2px; flex:1; min-height:8px; background:var(--hina-2); margin:2px 0; }
.tl-right { flex:1; padding-bottom:6px; padding-top:3px; }
.tl-station { font-family:'M PLUS Rounded 1c',sans-serif; font-size:14px; font-weight:800; color:var(--sumi); }
.tl-station.dep { color:#1565a0; }
.tl-station.arr { color:#c0392b; }
.tl-time { font-family:'Noto Serif JP',serif; font-size:12px; color:var(--sumi-light); margin-top:1px; }
/* train block */
.tl-train-block { display:flex; gap:12px; margin:4px 0; }
.tl-train-spine { width:30px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; }
.tl-train-seg { width:3px; flex:1; border-radius:2px; min-height:52px; }
.tl-train-info { flex:1; padding:10px 13px; border-radius:14px; background:var(--hina-0); border-left:4px solid #1565a0; margin-bottom:4px; }
.tl-line-pill { display:inline-flex; align-items:center; padding:2px 10px; border-radius:20px; font-family:'M PLUS Rounded 1c',sans-serif; font-size:11px; font-weight:800; color:white; margin-bottom:4px; }
.tl-train-detail { font-family:'Noto Serif JP',serif; font-size:11px; color:var(--sumi-light); line-height:1.8; }
/* xfer block */
.tl-xfer-block { display:flex; gap:12px; margin:2px 0; }
.tl-xfer-spine { width:30px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; }
.tl-xfer-seg { width:2px; flex:1; background:var(--hina-2); min-height:32px; }
.tl-xfer-info { flex:1; display:flex; align-items:center; gap:8px; padding:7px 12px; border-radius:12px; background:rgba(245,184,0,0.07); border:1px dashed rgba(245,184,0,0.4); margin-bottom:4px; font-family:'Noto Sans JP',sans-serif; font-size:12px; color:#a07800; }
/* empty */
.train-empty { text-align:center; padding:48px 20px; }
.train-empty-icon { font-size:52px; margin-bottom:14px; }
.train-empty-text { font-family:'Noto Serif JP',serif; font-size:13px; color:var(--sumi-light); line-height:1.9; }
</style>
</head>
<body>
<canvas id="petals-canvas"></canvas>
<div id="app">
  <div id="headerMount"></div>
  <div class="page-content page-enter">

    <div class="train-hero">
      <div class="train-hero-icon">🚃</div>
      <div class="train-hero-title">電車検索</div>
      <div class="train-hero-sub">✿ 乗り換え案内 ✿</div>
    </div>

    <div class="train-form-card">
      <div class="train-input-row">
        <div class="train-input-icon">🟢</div>
        <div class="train-input-wrap">
          <div class="train-input-label">✿ 出発駅</div>
          <input class="train-input" id="fromStation" type="text" placeholder="例：渋谷、新宿、池袋" autocomplete="off">
          <div class="suggest-list" id="fromSuggest"></div>
        </div>
      </div>
      <div style="text-align:center;margin-bottom:12px">
        <div class="train-swap-btn" onclick="swapStations()">⇅</div>
      </div>
      <div class="train-input-row">
        <div class="train-input-icon">🔴</div>
        <div class="train-input-wrap">
          <div class="train-input-label">✿ 到着駅</div>
          <input class="train-input" id="toStation" type="text" placeholder="例：東京、品川、横浜" autocomplete="off">
          <div class="suggest-list" id="toSuggest"></div>
        </div>
      </div>
      <div class="train-datetime-row">
        <div class="train-input-wrap">
          <div class="train-input-label">✿ 日付</div>
          <input class="train-input" id="trainDate" type="date">
        </div>
        <div class="train-input-wrap">
          <div class="train-input-label">✿ 時刻</div>
          <input class="train-input" id="trainTime" type="time">
        </div>
      </div>
      <button class="train-search-btn" id="searchBtn" onclick="doSearch()">
        <span>🚃</span> 乗り換えを検索
      </button>
    </div>

    <div class="train-loading" id="trainLoading">
      <span class="loading-train">🚃</span>
      <div class="loading-text">ルートを計算中です…</div>
    </div>
    <div class="train-error" id="trainError">
      <div class="train-error-text" id="trainErrorText"></div>
    </div>
    <div class="train-results" id="trainResults">
      <div class="section-kamon"><span class="section-kamon-text">✿ 検索結果 ✿</span></div>
      <div class="results-header" id="resultsHeader"></div>
      <div id="routesList"></div>
    </div>
    <div class="train-empty" id="trainEmpty">
      <div class="train-empty-icon">🚉</div>
      <div class="train-empty-text">
        出発駅と到着駅を入力して<br>乗り換えルートを検索しましょう
      </div>
    </div>

  </div>
</div>
<script src="data.js"></script>
<script src="nav.js"></script>
<script src="sakura.js"></script>
<script src="notify.js"></script>
<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ひなたカレンダー 電車検索エンジン

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

// ── ヘッダー・ナビ初期化 ─────────────────────
document.getElementById('headerMount').outerHTML = headerHTML('電車検索','🚃 乗り換え案内');
initNotifications();
injectNav('train.html');

// ── 日時の初期値 ────────────────────────────
(function() {
  const now = new Date();
  const p = n => String(n).padStart(2,'0');
  document.getElementById('trainDate').value = `${now.getFullYear()}-${p(now.getMonth()+1)}-${p(now.getDate())}`;
  document.getElementById('trainTime').value = `${p(now.getHours())}:${p(now.getMinutes())}`;
})();

// ── グラフ構築 ───────────────────────────────
const GRAPH = (function() {
  const g = {};
  const add = (a, b, min, key) => {
    const ln = LINE_DB[key];
    if (!g[a]) g[a] = [];
    if (!g[b]) g[b] = [];
    g[a].push({ to:b, minutes:min, lineKey:key, lineName:ln.name, lineColor:ln.color });
    g[b].push({ to:a, minutes:min, lineKey:key, lineName:ln.name, lineColor:ln.color });
  };
  for (const [key, ln] of Object.entries(LINE_DB)) {
    for (let i = 0; i < ln.stations.length - 1; i++) {
      add(ln.stations[i], ln.stations[i+1], ln.times[i], key);
    }
  }
  return g;
})();

const ALL_STATIONS = [...new Set(Object.values(LINE_DB).flatMap(l=>l.stations))].sort();

// ── サジェスト ───────────────────────────────
function showSuggest(inputId, listId) {
  const q = document.getElementById(inputId).value.trim();
  const list = document.getElementById(listId);
  const ms = ALL_STATIONS.filter(s => s.includes(q)).slice(0, 9);
  if (!q || !ms.length) { list.classList.remove('open'); return; }
  list.innerHTML = ms.map(s =>
    `<div class="suggest-item" onmousedown="pickStation('${inputId}','${listId}','${s}')">🚉 ${s}</div>`
  ).join('');
  list.classList.add('open');
}
function pickStation(inputId, listId, name) {
  document.getElementById(inputId).value = name;
  document.getElementById(listId).classList.remove('open');
}
document.getElementById('fromStation').addEventListener('input', () => showSuggest('fromStation','fromSuggest'));
document.getElementById('toStation').addEventListener('input',   () => showSuggest('toStation','toSuggest'));

  if (!e.target.closest('#fromStation')) document.getElementById('fromSuggest').classList.remove('open');
  if (!e.target.closest('#toStation'))   document.getElementById('toSuggest').classList.remove('open');
});

  const f = document.getElementById('fromStation');

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ルート探索エンジン（ダイクストラ法）
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function dijkstra(start, goal, xferPenalty = 3) {
  if (!GRAPH[start] || !GRAPH[goal]) return null;
  const dist = { [start]: 0 };
  const prev = {};
  const visited = new Set();
  // 優先度付きキュー（簡易配列）
  const pq = [[0, start, null]];  // [cost, station, prevLineKey]
  while (pq.length) {
    pq.sort((a,b) => a[0] - b[0]);
    const [d, u, prevLine] = pq.shift();
    if (visited.has(u)) continue;
    visited.add(u);
    if (u === goal) break;
    for (const edge of (GRAPH[u] || [])) {
      const xp = (prevLine !== null && prevLine !== edge.lineKey) ? xferPenalty : 0;
      const nd = d + edge.minutes + xp;
      if (nd < (dist[edge.to] ?? Infinity)) {
        dist[edge.to] = nd;
        prev[edge.to] = { from: u, edge };
        pq.push([nd, edge.to, edge.lineKey]);
      }
    }
  }
  if (dist[goal] === undefined) return null;
  // 経路復元
  const path = [];
  let cur = goal;
  while (cur !== start) {
    const p = prev[cur];
    path.unshift({ station: cur, edge: p.edge });
    cur = p.from;
  }
  path.unshift({ station: start, edge: null });
  return { path, totalMinutes: dist[goal] };
}

// パスを「乗車区間」にセグメント化
function toSegments(path) {
  const segs = [];
  let i = 1;
  while (i < path.length) {
    const lineKey = path[i].edge.lineKey;
    const boardIdx = i - 1;
    let j = i;
    while (j < path.length && path[j].edge && path[j].edge.lineKey === lineKey) j++;
    const boardAt = path[boardIdx].station;
    const alightAt = path[j-1].station;
    const ln = LINE_DB[lineKey];
    const bi = ln.stations.indexOf(boardAt), ai = ln.stations.indexOf(alightAt);
    let mins = 0;
    if (bi >= 0 && ai >= 0) {
      const lo = Math.min(bi,ai), hi = Math.max(bi,ai);
      for (let k = lo; k < hi; k++) mins += ln.times[k];
    } else {
      for (let k = boardIdx; k < j-1; k++) mins += path[k+1].edge.minutes;
    }
    segs.push({ lineKey, lineName: ln.name, lineColor: ln.color, boardAt, alightAt, minutes: mins });
    i = j;
  }
  return segs;
}

// 3ルート生成
function findRoutes(from, to) {
  const r1 = dijkstra(from, to, 3);    // おすすめ
  const r2 = dijkstra(from, to, 15);   // 乗り換え少なめ
  const routes = [];
  if (r1) routes.push({ label:'おすすめ（最速）', badgeClass:'best',  icon:'⚡', result: r1 });
  if (r2) {
    const same = r1 && JSON.stringify(r2.path.map(p=>p.station)) === JSON.stringify(r1.path.map(p=>p.station));
    routes.push({ label: same?'最速ルート':'乗り換え少なめ', badgeClass:'few', icon:'🔄', result: r2 });
  }
  // 3本目：主要乗り換えハブを経由した別ルート
  const hubs = ['東京','新宿','渋谷','品川','上野','秋葉原','池袋','横浜','北千住','赤羽','大手町','銀座','日本橋','押上','錦糸町','神田','有楽町','新橋'];
  for (const hub of hubs) {
    if (hub === from || hub === to) continue;
    const rA = dijkstra(from, hub, 3);
    const rB = dijkstra(hub, to, 3);
    if (!rA || !rB) continue;
    const combined = {
      path: [...rA.path, ...rB.path.slice(1)],
      totalMinutes: rA.totalMinutes + rB.totalMinutes + 2
    };
    const pathKey = JSON.stringify(combined.path.map(p=>p.station));
    const isDup = routes.some(r => JSON.stringify(r.result.path.map(p=>p.station)) === pathKey);
    if (!isDup) {
      routes.push({ label:'別ルート', badgeClass:'other', icon:'🛤️', result: combined });
      break;
    }
  }
  // 3本に満たなければ複製
  while (routes.length < 3 && routes.length > 0) {
    const base = routes[routes.length - 1];
    routes.push({ ...base, label: routes.length === 1 ? '別候補' : '参考ルート' });
  }
  return routes.slice(0,3);
}

// ── 時間計算 ─────────────────────────────────
function addMin(timeStr, mins) {
  const [h, m] = timeStr.split(':').map(Number);
  const total = h*60 + m + mins;
  return `${String(Math.floor(total/60)%24).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
}

// 運賃の簡易計算
function calcFare(totalMin) {
  const km = totalMin * 0.55;
  if (km <= 3)  return 150;
  if (km <= 6)  return 180;
  if (km <= 10) return 200;
  if (km <= 15) return 230;
  if (km <= 20) return 260;
  if (km <= 26) return 310;
  if (km <= 33) return 390;
  if (km <= 40) return 460;
  return 560;
}

// タイムライン構築
function buildTimeline(result, depTime) {
  const segs = toSegments(result.path);
  const tl = [];
  let t = depTime;
  tl.push({ type:'dep', station: result.path[0].station, time: t });
  segs.forEach((seg, si) => {
    tl.push({ type:'train', ...seg, dep: t, arr: addMin(t, seg.minutes) });
    t = addMin(t, seg.minutes);
    if (si < segs.length - 1) {
      tl.push({ type:'xfer', station: seg.alightAt, time: t, walkMins: 3 });
      t = addMin(t, 3);
    }
  });
  tl.push({ type:'arr', station: result.path[result.path.length-1].station, time: t });
  return { tl, transfers: Math.max(0, segs.length - 1) };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  UI / 描画
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function doSearch() {
  const from = document.getElementById('fromStation').value.trim();
  const to   = document.getElementById('toStation').value.trim();
  const date = document.getElementById('trainDate').value;
  const time = document.getElementById('trainTime').value;

  if (!from) { showErr('出発駅を入力してください。'); return; }
  if (!to)   { showErr('到着駅を入力してください。'); return; }
  if (from === to) { showErr('出発駅と到着駅が同じです。'); return; }
  if (!GRAPH[from]) { showErr(`「${from}」はデータベースにありません。\n入力欄のサジェストから選んでください。`); return; }
  if (!GRAPH[to])   { showErr(`「${to}」はデータベースにありません。\n入力欄のサジェストから選んでください。`); return; }

  hideErr();
  document.getElementById('trainEmpty').style.display = 'none';
  document.getElementById('trainResults').style.display = 'none';
  setLoading(true);

  setTimeout(() => {
    try {
      const rawRoutes = findRoutes(from, to);
      if (!rawRoutes.length) { showErr('ルートが見つかりませんでした。'); setLoading(false); return; }
      const [y, mo, d] = date.split('-');
      const dateJp = `${y}年${parseInt(mo)}月${parseInt(d)}日`;
      document.getElementById('resultsHeader').innerHTML =
        `<div class="results-route-label">${from} → ${to}</div>${dateJp}　${time} 出発`;
      document.getElementById('routesList').innerHTML = rawRoutes.map(r => {
        const { tl, transfers } = buildTimeline(r.result, time);
        const fare = calcFare(r.result.totalMinutes);
        return renderCard(r, tl, transfers, fare);
      }).join('');
      document.getElementById('trainResults').style.display = 'block';
    } catch(e) {
      showErr('計算中にエラーが発生しました。別の駅名でお試しください。');
    }
    setLoading(false);
  }, 500);
}

function setLoading(on) {
  document.getElementById('trainLoading').classList.toggle('visible', on);
  document.getElementById('searchBtn').disabled = on;
}
function showErr(msg) {
  const el = document.getElementById('trainError');
  document.getElementById('trainErrorText').textContent = msg;
  el.classList.add('visible');
  document.getElementById('trainEmpty').style.display = 'none';
}
function hideErr() { document.getElementById('trainError').classList.remove('visible'); }

function renderCard(r, tl, transfers, fare) {
  const xferText = transfers === 0 ? '乗り換えなし' : `乗り換え${transfers}回`;
  const tlHTML = tl.map(step => {
    if (step.type === 'dep') return `
      <div class="tl-item">
        <div class="tl-left"><div class="tl-dot dep">🟢</div><div class="tl-vline"></div></div>
        <div class="tl-right">
          <div class="tl-station dep">${step.station}</div>
          <div class="tl-time">出発 ${step.time}</div>
        </div>
      </div>`;
    if (step.type === 'arr') return `
      <div class="tl-item">
        <div class="tl-left"><div class="tl-dot arr">🔴</div></div>
        <div class="tl-right">
          <div class="tl-station arr">${step.station}</div>
          <div class="tl-time">到着 ${step.time}</div>
        </div>
      </div>`;
    if (step.type === 'xfer') return `
      <div class="tl-item">
        <div class="tl-left"><div class="tl-dot xfer">🔄</div><div class="tl-vline"></div></div>
        <div class="tl-right">
          <div class="tl-station">${step.station}（乗り換え）</div>
          <div class="tl-time">${step.time}　徒歩約${step.walkMins}分</div>
        </div>
      </div>`;
    if (step.type === 'train') return `
      <div class="tl-train-block">
        <div class="tl-train-spine">
          <div class="tl-train-seg" style="background:${step.lineColor}"></div>
        </div>
        <div class="tl-train-info" style="border-left-color:${step.lineColor}">
          <div><span class="tl-line-pill" style="background:${step.lineColor}">${step.lineName}</span></div>
          <div class="tl-train-detail">
            ${step.boardAt} ${step.dep} 発 → ${step.alightAt} ${step.arr} 着（${step.minutes}分）
          </div>
        </div>
      </div>`;
    return '';
  }).join('');

  return `
  <div class="route-card">
    <div class="route-card-header">
      <div>
        <div class="route-badge ${r.badgeClass}">${r.icon} ${r.label}</div>
        <div class="xfer-count-text">${xferText}</div>
      </div>
      <div class="route-meta">
        <div class="route-total-time">${r.result.totalMinutes}<small>分</small></div>
        <div class="route-fare-text">約 ¥${fare}</div>
      </div>
    </div>
    <div class="route-body">${tlHTML}</div>
  </div>`;
}
</script>
